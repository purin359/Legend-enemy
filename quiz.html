<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ステージ当てクイズ</title>

<style>
body {
  font-family: sans-serif;
  padding: 16px;
  max-width: 600px;
  margin: auto;
}

h2 {
  font-size: 22px;
  margin-bottom: 12px;
}

/* 入力欄 */
input {
  font-size: 16px;
  padding: 12px;
  width: 100%;
  box-sizing: border-box;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

/* ボタン */
button {
  font-size: 16px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #4CAF50;
  color: white;
  margin: 5px 5px 10px 0;
}

/* セレクト */
select {
  font-size: 16px;
  padding: 10px;
  border-radius: 8px;
  margin-right: 8px;
}

/* テーブル */
table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  font-size: 14px;
}

/* 画像 */
img {
  width: 50px;
}  

  .enemyBox {
  border: none;                /* ←削除 */
  border-radius: 12px;
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;

  background: #eaf4ff;         /* ←色で囲む */
}
  
</style>
</head>
<body>

<div class="container">

  <h2>ステージ当てクイズ</h2>

  <div class="topBar">
    <select id="mode" onchange="changeMode()">
      <option value="ALL">全て</option>
      <option value="N">レジェンド</option>
      <option value="NA">真レジェンド</option>
      <option value="ND">レジェンド0</option>
    </select>

    <div id="score">0 / 0</div>
  </div>

  <div id="enemies"></div>

  <input id="answer" placeholder="ステージ名を入力">
  <br><br>

  <button onclick="check()">回答</button>
  <button onclick="nextQuiz()">次の問題</button>

  <div id="result"></div>

</div>
<script>
let stagesData = [];
let current = null;

let correct = 0;      // 連続正解数
let bestScore = 0;    // 最高記録
let justCorrect = false;

// 画像用
function getFileName(name) {
  return name
    .replace(/\r?\n/g, "")
    .trim()
    .replace(/[：:]/g, " ")
    .replace(/[ 　]+/g, "");
}

// 比較用
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

async function init() {
  stagesData = await fetch("stages.json").then(r=>r.json());

  loadBest(); // ←変更

  document.getElementById("answer").addEventListener("keydown", e => {
    if (e.key === "Enter") check();
  });

  updateScore();
  nextQuiz();
}
  
function isTargetChapter(ch, mode) {
  return (
    (mode === "ALL") ||

    (mode === "N" && (
      (ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND"))
      || ch.chapterId === "E026"
    )) ||

    (mode === "NA" && (
      ch.chapterId.startsWith("NA")
      || ch.chapterId === "E068"
      || ch.chapterId === "E069"
    )) ||

    (mode === "ND" && ch.chapterId.startsWith("ND"))
  );
}

function nextQuiz() {

  if (!justCorrect) {
    correct = 0;
  }

  justCorrect = false;

  updateScore();

  const mode = document.getElementById("mode").value;

  document.getElementById("result").textContent = "";
  document.getElementById("answer").value = "";

  let pool = [];

  stagesData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach(st => {
      pool.push({
        stageName: st.stageName,
        chapterName: ch.chapterName,
        enemies: st.enemies
      });
    });
  });

  const q = pool[Math.floor(Math.random() * pool.length)];
  current = q;

  const enemiesDiv = document.getElementById("enemies");
  enemiesDiv.innerHTML = "";

  const box = document.createElement("div");
  box.className = "enemyBox";

  q.enemies.forEach(enemy => {
    if (enemy === "カンバン娘") return;

    const img = document.createElement("img");
    img.src = "image/" + encodeURIComponent(getFileName(enemy)) + ".png";
    img.onerror = () => img.src = "image/noimage.png";

    box.appendChild(img);
  });

  enemiesDiv.appendChild(box);
}
  
function check() {
  const input = document.getElementById("answer").value;
  const ok = normalize(input) === normalize(current.stageName);

  const result = document.getElementById("result");

  if (ok) {
    result.textContent = "正解！ 🎉";
    result.style.color = "green";

    correct++;

    if (correct > bestScore) {
      bestScore = correct;
      saveBest();
    }

    justCorrect = true;

    setTimeout(nextQuiz, 800);

  } else {
    result.textContent =
      `不正解！ 正解：${current.chapterName} - ${current.stageName}`;
    result.style.color = "red";

    correct = 0;
  }

  updateScore();
}  
function updateScore() {
  document.getElementById("score").textContent =
    `連続: ${correct} / 最高: ${bestScore}`;
}

  function saveScore() {
  const mode = document.getElementById("mode").value;
  const key = "quizScore_" + mode;

  localStorage.setItem(key, JSON.stringify({
    correct,

  }));
}

function saveBest() {
  const mode = document.getElementById("mode").value;
  const key = "quizBest_" + mode;

  localStorage.setItem(key, bestScore);
}

function loadBest() {
  const mode = document.getElementById("mode").value;
  const key = "quizBest_" + mode;

  const data = localStorage.getItem(key);
  bestScore = data ? Number(data) : 0;
}

  function changeMode() {
  correct = 0;
  loadBest();
  updateScore();
  nextQuiz();
}

  
init();
</script>

</body>
</html>
