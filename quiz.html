<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ステージ当てクイズ</title>

<style>
body {
  font-family: sans-serif;
  padding: 16px;
  max-width: 600px;
  margin: auto;
}

h2 {
  font-size: 22px;
  margin-bottom: 12px;
}

/* 入力欄 */
input {
  font-size: 16px;
  padding: 12px;
  width: 100%;
  box-sizing: border-box;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

/* ボタン */
button {
  font-size: 16px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #4CAF50;
  color: white;
  margin: 5px 5px 10px 0;
}

/* セレクト */
select {
  font-size: 16px;
  padding: 10px;
  border-radius: 8px;
  margin-right: 8px;
}

/* テーブル */
table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  font-size: 14px;
}

/* 画像 */
img {
  width: 50px;
}  

  .enemyBox {
  border: none;                /* ←削除 */
  border-radius: 12px;
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;

  background: #eaf4ff;         /* ←色で囲む */
}

  #suggest {
  border: 1px solid #ccc;
  border-radius: 8px;
  max-height: 150px;
  overflow-y: auto;
  background: white;
  position: absolute;
  width: calc(100% - 32px);
  z-index: 10;
}

.suggestItem {
  padding: 8px;
  cursor: pointer;
}

.suggestItem:hover {
  background: #eaf4ff;
}

  .container {
  position: relative;
}

  .topBar {
  display: flex;
  align-items: center;
  gap: 10px;
}

.hintBtn {
  margin-left: auto; /* ←これで右端に飛ぶ */
}

  
</style>
</head>
<body>

<div class="container">

  <h2>ステージ当てクイズ</h2>

  <div class="topBar">
    <select id="mode" onchange="changeMode()">
      <option value="ALL">全て</option>
      <option value="N">レジェンド</option>
      <option value="NA">真レジェンド</option>
      <option value="ND">レジェンド0</option>
    </select>

    <div id="score">0 / 0</div>
    <button class="hintBtn" onclick="showHint()">ヒント</button>
  </div>

  <div id="enemies"></div>

  <input id="answer" placeholder="ステージ名を入力" autocomplete="off">
<div id="suggest"></div>
  <br><br>

  <button onclick="check()">回答</button>
  <button onclick="skipQuiz()">次の問題</button>

  <div id="result"></div>

</div>
<script>
let stagesData = [];
let current = null;

let correct = 0;      // 連続正解数
let bestScore = 0;    // 最高記録
let justCorrect = false;
let stageList = [];
let hintTotal = 0;    // このゲーム中のヒント合計
let bestHint = 9999;
let answered = false;   // 回答済みか
let lastResult = null;  // "ok" or "ng"
let wasWrong = false;

// 画像用
function getFileName(name) {
  return name
    .replace(/\r?\n/g, "")
    .trim()
    .replace(/[：:]/g, " ")
    .replace(/[ 　]+/g, "");
}

// 比較用
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

async function init() {
  stagesData = await fetch("stages.json").then(r=>r.json());

  const mode = document.getElementById("mode").value;
buildStageList(mode);

  loadBest();

  document.getElementById("answer").addEventListener("keydown", e => {
  if (e.key === "Enter") check();
});

  document.getElementById("answer").addEventListener("input", () => {
  const input = document.getElementById("answer").value;
  const suggest = document.getElementById("suggest");

  suggest.innerHTML = "";

  if (!input) return;

  const keyword = normalizeSearch(input);

  const results = stageList.filter(name =>
    normalizeSearch(name).includes(keyword)
  ).slice(0, 20); // 最大20件

  results.forEach(name => {
    const div = document.createElement("div");
    div.className = "suggestItem";
    div.textContent = name;

    div.onclick = () => {
      document.getElementById("answer").value = name;
      suggest.innerHTML = "";
    };

    suggest.appendChild(div);
  });
});

  updateScore();
  nextQuiz();
}
  
function isTargetChapter(ch, mode) {
  return (
    (mode === "ALL") ||

    (mode === "N" && (
      (ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND"))
      || ch.chapterId === "E026"
    )) ||

    (mode === "NA" && (
      ch.chapterId.startsWith("NA")
      || ch.chapterId === "E068"
      || ch.chapterId === "E069"
    )) ||

    (mode === "ND" && ch.chapterId.startsWith("ND"))
  );
}

function nextQuiz() {

  if (!justCorrect) {
    correct = 0;
    hintTotal = 0;
  }

  justCorrect = false;
  answered = false;   // ←追加
  wasWrong = false;   // ←追加

  updateScore();

  const mode = document.getElementById("mode").value;

  document.getElementById("result").textContent = "";
  document.getElementById("answer").value = "";

  let pool = [];

  stagesData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach(st => {
      pool.push({
  stageName: st.stageName,
  chapterName: ch.chapterName,
  chapterId: ch.chapterId,
  stageId: st.stageId,
  enemies: st.enemies
});
      
    });
  });

  const q = pool[Math.floor(Math.random() * pool.length)];
  current = q;

  const enemiesDiv = document.getElementById("enemies");
  enemiesDiv.innerHTML = "";

  const box = document.createElement("div");
  box.className = "enemyBox";

  q.enemies.forEach(enemy => {
    if (enemy === "カンバン娘") return;

    const img = document.createElement("img");
    img.src = "image/" + encodeURIComponent(getFileName(enemy)) + ".png";
    img.onerror = () => img.src = "image/noimage.png";

    box.appendChild(img);
  });

  enemiesDiv.appendChild(box);
}
  
function check() {
  const input = document.getElementById("answer").value;
  const inputNorm = normalize(input);

  const nameOK = inputNorm === normalize(current.stageName);
  const idText = `${current.chapterId}-${current.stageId}`;
  const idOK = inputNorm === normalize(idText);

  const ok = nameOK || idOK;

  const result = document.getElementById("result");

  answered = true;

  if (ok) {
    result.textContent = "正解！ 🎉";
    result.style.color = "green";

    correct++;

    if (
      correct > bestScore ||
      (correct === bestScore && hintTotal < bestHint)
    ) {
      bestScore = correct;
      bestHint = hintTotal;
      saveBest();
    }

    justCorrect = true;
    wasWrong = false;

    setTimeout(nextQuiz, 800);

  } else {
    result.textContent =
      `不正解！ 正解：${current.chapterName} - ${current.stageName}`;
    result.style.color = "red";

    correct = 0;
    hintTotal = 0;

    wasWrong = true;
  }

  updateScore();
}  
function updateScore() {
  document.getElementById("score").textContent =
    `連続: ${correct}（ヒント: ${hintTotal}） / 最高: ${bestScore}（ヒント: ${bestHint}）`;
}
  
  function saveScore() {
  const mode = document.getElementById("mode").value;
  const key = "quizScore_" + mode;

  localStorage.setItem(key, JSON.stringify({
    correct,
    total
  }));
}

function saveBest() {
  const mode = document.getElementById("mode").value;
  const key = "quizBest_" + mode;

  localStorage.setItem(key, JSON.stringify({
    score: bestScore,
    hint: bestHint
  }));
}

function loadBest() {
  const mode = document.getElementById("mode").value;
  const key = "quizBest_" + mode;

  const data = localStorage.getItem(key);

  if (data) {
    try {
      const obj = JSON.parse(data);

      if (typeof obj === "object") {
        bestScore = obj.score ?? 0;

        // 🔥 ここが重要
        if (bestScore === 0) {
          bestHint = 0;
        } else {
          bestHint = obj.hint ?? 0;
        }

      } else {
        bestScore = Number(obj) || 0;
        bestHint = 0;
      }

    } catch {
      bestScore = 0;
      bestHint = 0;
    }
  } else {
    bestScore = 0;
    bestHint = 0;
  }
}

  function changeMode() {
  correct = 0;
  loadBest();

  const mode = document.getElementById("mode").value;
  buildStageList(mode); // ←重要

  updateScore();
  nextQuiz();
}
  
  function buildStageList(mode) {
  stageList = [];

  stagesData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach(st => {
      stageList.push(st.stageName);
    });
  });
}

  function normalizeSearch(str) {
  return str
    .toLowerCase()
    .replace(/[ぁ-ん]/g, s =>
      String.fromCharCode(s.charCodeAt(0) + 0x60)) // ひら→カタ
    .replace(/[ァ-ヶ]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0x60)) // カタ→ひら（統一）
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0xFEE0)) // 全角→半角
    .replace(/[ 　]/g, "")
    .trim();
}

 function skipQuiz() {

  const result = document.getElementById("result");

  // ▼ 不正解後は何もせず次へ
  if (wasWrong) {
    nextQuiz();
    return;
  }

  // ▼ 未回答なら判定
  if (!answered) {

    const input = document.getElementById("answer").value;
    const inputNorm = normalize(input);

    const nameOK = inputNorm === normalize(current.stageName);
    const idText = `${current.chapterId}-${current.stageId}`;
    const idOK = inputNorm === normalize(idText);

    const ok = nameOK || idOK;

    if (ok) {
      result.textContent = "正解！ 🎉";
      result.style.color = "green";

      correct++;

      if (
        correct > bestScore ||
        (correct === bestScore && hintTotal < bestHint)
      ) {
        bestScore = correct;
        bestHint = hintTotal;
        saveBest();
      }

      justCorrect = true;
      wasWrong = false;

      updateScore();
      setTimeout(nextQuiz, 800);
      return;
    }
  }

  // ▼ それ以外（純粋スキップ）
  result.textContent =
    `スキップ！ 正解：${current.chapterName} - ${current.stageName}`;
  result.style.color = "red";

  correct = 0;
  hintTotal = 0;

  wasWrong = true;

  updateScore();

  setTimeout(nextQuiz, 800);
}  
  function showHint() {

  const mode = document.getElementById("mode").value;
  const result = document.getElementById("result");

  let hint = "";

  if (mode === "ALL") {

    if (current.chapterId.startsWith("N") &&
        !current.chapterId.startsWith("NA") &&
        !current.chapterId.startsWith("ND")) {
      hint = "ヒント：レジェンド";
    }

    else if (current.chapterId.startsWith("NA")) {
      hint = "ヒント：真レジェンド";
    }

    else if (current.chapterId.startsWith("ND")) {
      hint = "ヒント：レジェンド0";
    }

  } else {
    hint = `ヒント：${current.chapterName}`;
  }

  result.textContent = hint;
  result.style.color = "blue";

  hintTotal++; // ←ここ変更🔥
  updateScore();
}
  
init();
</script>

</body>
</html>
