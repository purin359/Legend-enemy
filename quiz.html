<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ステージ当てクイズ</title>

<style>
body { font-family: sans-serif; padding:20px; text-align:center; }

#enemies img {
  width:60px;
  margin:5px;
}

input { padding:5px; width:250px; }
button { padding:5px 10px; margin:5px; }

#result { margin-top:10px; font-weight:bold; }
</style>
</head>
<body>

<h2>ステージ当てクイズ</h2>

<select id="mode" onchange="nextQuiz()">
  <option value="ALL">全て</option>
  <option value="N">レジェンド</option>
  <option value="NA">真レジェンド</option>
  <option value="ND">レジェンド0</option>
</select>

<p id="score">0 / 0</p>

<div id="enemies"></div>

<input id="answer" placeholder="ステージ名を入力">
<br>
<button onclick="check()">回答</button>
<button onclick="nextQuiz()">次の問題</button>

<div id="result"></div>

<script>
let stagesData = [];
let current = null;

let correct = 0;
let total = 0;

// 画像用
function getFileName(name) {
  return name
    .replace(/\r?\n/g, "")
    .trim()
    .replace(/[：:]/g, " ")
    .replace(/[ 　]+/g, "");
}

// 比較用
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

async function init() {
  stagesData = await fetch("stages.json").then(r=>r.json());
  nextQuiz();
}

function isTargetChapter(ch, mode) {
  return (
    (mode === "ALL") ||

    (mode === "N" && (
      (ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND"))
      || ch.chapterId === "E026"
    )) ||

    (mode === "NA" && (
      ch.chapterId.startsWith("NA")
      || ch.chapterId === "E068"
      || ch.chapterId === "E069"
    )) ||

    (mode === "ND" && ch.chapterId.startsWith("ND"))
  );
}

function nextQuiz() {

  const mode = document.getElementById("mode").value;

  document.getElementById("result").textContent = "";
  document.getElementById("answer").value = "";

  let pool = [];

  stagesData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach(st => {
      pool.push({
        stageName: st.stageName,
        chapterName: ch.chapterName,
        enemies: st.enemies
      });
    });
  });

  // ランダム
  const q = pool[Math.floor(Math.random() * pool.length)];

  current = q;

  total++;
  updateScore();

  const enemiesDiv = document.getElementById("enemies");
  enemiesDiv.innerHTML = "";

  q.enemies.forEach(enemy => {

    if (enemy === "カンバン娘") return;

    const img = document.createElement("img");
    img.src = "image/" + encodeURIComponent(getFileName(enemy)) + ".png";
    img.onerror = () => img.src = "image/noimage.png";

    enemiesDiv.appendChild(img);
  });
}

function check() {
  const input = document.getElementById("answer").value;

  const ok = normalize(input) === normalize(current.stageName);

  const result = document.getElementById("result");

  if (ok) {
    result.textContent = "正解！ 🎉";
    correct++;
  } else {
    result.textContent =
      `不正解！ 正解：${current.chapterName} - ${current.stageName}`;
  }

  updateScore();
}

function updateScore() {
  document.getElementById("score").textContent =
    `${correct} / ${total}`;
}

init();
</script>

</body>
</html>
