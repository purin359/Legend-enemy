<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レジェンド敵クイズ</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: sans-serif;
  max-width: 680px;
  margin: auto;
  padding: 16px;
  color: #222;
}

h2 {
  margin: 0 0 14px;
  font-size: 22px;
}

.topRow {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

select,
input,
button {
  font-size: 16px;
}

select {
  padding: 10px 12px;
  border: 1px solid #bbb;
  border-radius: 8px;
  background: #fff;
}

button {
  padding: 10px 14px;
  border: 0;
  border-radius: 8px;
  background: #4caf50;
  color: #fff;
  cursor: pointer;
}

button:hover {
  filter: brightness(0.95);
}

button:disabled {
  background: #999;
  cursor: not-allowed;
  filter: none;
}

.secondaryBtn {
  background: #777;
}

.dangerBtn {
  background: #e05252;
}

.scoreRow {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-areas:
    "score best"
    "timer record"
    ". hint";
  gap: 8px 16px;
  align-items: center;
  margin: 8px 0 12px;
  font-size: 15px;
}

#score {
  grid-area: score;
}

#best {
  grid-area: best;
}

#timer {
  grid-area: timer;
}

#hintCount {
  grid-area: hint;
}

.recordBtn {
  grid-area: record;
  width: auto;
  justify-self: start;
  padding: 8px 14px;
}
  
.questionBox {
  border-radius: 12px;
  background: #eaf4ff;
  padding: 18px;
  text-align: center;
  margin-bottom: 14px;
}

.questionBox img {
  width: 96px;
  height: 96px;
  object-fit: contain;
}

.enemyName {
  margin-top: 8px;
  font-size: 20px;
  font-weight: bold;
}

.progressText {
  margin-top: 8px;
  font-weight: bold;
}

.answerWrap {
  position: relative;
}

.answerRow {
  display: flex;
  gap: 8px;
}

#answer {
  width: 100%;
  min-width: 0;
  padding: 12px;
  border: 1px solid #bbb;
  border-radius: 8px;
}

.clearBtn {
  min-width: 46px;
  padding: 0;
  background: #888;
}

#suggest {
  position: absolute;
  left: 0;
  right: 54px;
  top: 48px;
  z-index: 20;
  max-height: 190px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid #ccc;
  border-radius: 8px;
  display: none;
}

.suggestItem {
  padding: 9px;
  cursor: pointer;
  border-bottom: 1px solid #eee;
}

.suggestItem:last-child {
  border-bottom: none;
}

.suggestItem:hover,
.suggestItem.active {
  background: #dceeff;
}

.btnRow {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}

#result {
  min-height: 24px;
  margin: 12px 0;
  white-space: pre-line;
  font-weight: bold;
}

#persistentHint{
  display:flex;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
  margin-top:10px;
}

.hintTitle{
  width:100%;
  font-weight:bold;
  margin-bottom:6px;
}

.answerListBox {
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 12px;
  margin-top: 14px;
}

.answerListBox h3 {
  margin: 0 0 8px;
  font-size: 17px;
}

#answeredList,
#remainingList {
  margin: 0;
  padding-left: 22px;
}

#answeredList li {
  color: #168139;
  margin: 4px 0;
}

#remainingList li {
  margin: 4px 0;
}

.hintEnemy {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 8px auto 0;
  padding: 8px 10px;
  border: 1px solid #b9d7f5;
  border-radius: 8px;
  width: fit-content;
  max-width: 100%;
  background: #f4f9ff;
  color: #1565c0;
}

.hintEnemy img {
  width: 48px;
  height: 48px;
  object-fit: contain;
}

.hidden {
  display: none;
}

.loading {
  padding: 20px;
  text-align: center;
  color: #666;
}

@media (max-width: 520px) {
  body {
    padding: 12px;
  }

  h2 {
    font-size: 20px;
  }

  .questionBox img {
    width: 82px;
    height: 82px;
  }
}

.recordBtn {
  background: #5c6bc0;
}

.recordOverlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: none;
  background: rgba(0, 0, 0, 0.48);
  padding: 14px;
  overflow-y: auto;
}

.recordOverlay.open {
  display: block;
}

.recordDialog {
  width: min(680px, 100%);
  margin: 20px auto;
  padding: 16px;
  border-radius: 12px;
  background: #fff;
}

.recordHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.recordHeader h3 {
  margin: 0;
  font-size: 20px;
}

.recordCloseBtn {
  min-width: 42px;
  padding: 8px 10px;
  background: #777;
}

.recordLegend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
  font-size: 13px;
}

.recordLegend span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.recordColor {
  width: 18px;
  height: 18px;
  border: 1px solid #aaa;
  border-radius: 4px;
}

.recordGrid {
  display: grid;
  grid-template-columns: repeat(8, minmax(0, 1fr));
  gap: 7px;
}

.recordCell {
  min-width: 0;
  aspect-ratio: 1 / 1;
  padding: 4px;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #f8f8f8;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.recordCell:hover {
  outline: 2px solid #777;
}

.recordCell img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.recordAttempted {
  background: #fff3a6;
}

.recordCleared {
  background: #c8f3a6;
}

.recordNoHint {
  background: #aee8ff;
}

.recordDetail {
  margin-top: 14px;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 10px;
  background: #fafafa;
}

.recordDetailTitle {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  font-weight: bold;
  font-size: 18px;
}

.recordDetailTitle img {
  width: 56px;
  height: 56px;
  object-fit: contain;
}

.recordDetailRow {
  margin: 5px 0;
}

@media (max-width: 520px) {
  .recordGrid {
    grid-template-columns: repeat(8, minmax(0, 1fr));
    gap: 4px;
  }

  .recordCell {
    padding: 2px;
    border-radius: 5px;
  }
}

</style>
</head>
<body>

<h2>レジェンド敵クイズ</h2>

<div class="topRow">
  <select id="mode" onchange="changeMode()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

  <button type="button" class="secondaryBtn" onclick="newQuestion()">
    別の敵
  </button>
</div>

<div class="scoreRow">
  <div id="score">連続クリア: 0</div>
  <div id="best">最高記録: 0</div>
  <div id="timer">タイム: 00:00</div>

  <button
    type="button"
    class="recordBtn"
    onclick="openRecordList()"
  >
    最高記録一覧
  </button>

  <div id="hintCount">ヒント: 0回</div>
</div>

<div id="loading" class="loading">データを読み込んでいます…</div>

<div id="game" class="hidden">
  <div class="questionBox">
    <img id="enemyImage" src="image/noimage.png" alt="出題敵">
    <div id="enemyName" class="enemyName"></div>
    <div id="progress" class="progressText"></div>
  </div>

  <div class="answerWrap">
    <div class="answerRow">
      <input
        id="answer"
        type="text"
        placeholder="ステージ名 または N001-0 の形式で入力"
        autocomplete="off"
      >
      <button type="button" class="clearBtn" onclick="clearAnswer()">×</button>
    </div>
    <div id="suggest"></div>
  </div>

  <div class="btnRow">
    <button id="checkBtn" type="button" onclick="checkAnswer()">回答</button>
    <button id="hintBtn" type="button" class="secondaryBtn" onclick="showHint()">ヒント</button>
    <button id="giveUpBtn" type="button" class="dangerBtn" onclick="giveUp()">ギブアップ</button>
    <button id="nextBtn" type="button" onclick="newQuestion()" class="hidden">次の敵</button>
  </div>

  <div id="persistentHint"></div>
  <div id="result"></div>

  <div class="answerListBox">
    <h3>回答済み</h3>
    <ul id="answeredList"></ul>
  </div>

  <div id="remainingBox" class="answerListBox hidden">
    <h3>残りの正解</h3>
    <ul id="remainingList"></ul>
  </div>
</div>


<div id="recordOverlay" class="recordOverlay" onclick="closeRecordListByOutside(event)">
  <div class="recordDialog">
    <div class="recordHeader">
      <h3 id="recordTitle">最高記録一覧</h3>
      <button type="button" class="recordCloseBtn" onclick="closeRecordList()">×</button>
    </div>

    <div class="recordLegend">
      <span><i class="recordColor recordNoHint"></i>ヒントなしクリア</span>
      <span><i class="recordColor recordCleared"></i>クリア済み</span>
      <span><i class="recordColor recordAttempted"></i>挑戦済み・未クリア</span>
    </div>

    <div id="recordGrid" class="recordGrid"></div>
    <div id="recordDetail" class="recordDetail">
      敵アイコンを押すと記録を表示します
    </div>
  </div>
</div>

<script>
let stagesData = [];
let enemiesData = {};
let quizPool = [];
let allStageCandidates = [];
let current = null;
let answeredKeys = new Set();
let score = 0;
let bestScore = 0;
let suggestIndex = -1;
let currentSuggestList = [];
let questionFinished = false;

let timerId = null;
let questionStartTime = 0;
let elapsedSeconds = 0;
let hintUseCount = 0;
let currentAttemptSaved = false;
let currentHints = [];


function getRecordStorageKey(mode, enemyName) {
  return `enemyAllStagesQuizRecord_${mode}_${encodeURIComponent(normalize(enemyName))}`;
}

function getEnemyRecord(mode, enemyName) {
  const raw = localStorage.getItem(getRecordStorageKey(mode, enemyName));

  if (!raw) {
    return {
      attempts: 0,
      clears: 0,
      bestTime: null,
      bestHints: null
    };
  }

  try {
    const record = JSON.parse(raw);

    return {
      attempts: Number(record.attempts) || 0,
      clears: Number(record.clears) || 0,
      bestTime:
        record.bestTime === null || record.bestTime === undefined
          ? null
          : Number(record.bestTime),
      bestHints:
        record.bestHints === null || record.bestHints === undefined
          ? null
          : Number(record.bestHints)
    };
  } catch {
    return {
      attempts: 0,
      clears: 0,
      bestTime: null,
      bestHints: null
    };
  }
}

function saveEnemyRecord(mode, enemyName, record) {
  localStorage.setItem(
    getRecordStorageKey(mode, enemyName),
    JSON.stringify(record)
  );
}

function saveCurrentAttempt(cleared) {
  if (!current || currentAttemptSaved) return;

  stopQuestionTimer();

  const mode = document.getElementById("mode").value;
  const record = getEnemyRecord(mode, current.enemyName);

  record.attempts++;

  if (cleared) {
    record.clears++;

    const isFirstClear =
      record.bestHints === null ||
      record.bestTime === null;

    const isBetter =
      isFirstClear ||
      hintUseCount < record.bestHints ||
      (
        hintUseCount === record.bestHints &&
        elapsedSeconds < record.bestTime
      );

    if (isBetter) {
      record.bestHints = hintUseCount;
      record.bestTime = elapsedSeconds;
    }
  }

  saveEnemyRecord(mode, current.enemyName, record);
  currentAttemptSaved = true;
}

function openRecordList() {
  const overlay = document.getElementById("recordOverlay");
  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
  renderRecordList();
}

function closeRecordList() {
  document.getElementById("recordOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

function closeRecordListByOutside(event) {
  if (event.target.id === "recordOverlay") {
    closeRecordList();
  }
}

function renderRecordList() {
  const mode = document.getElementById("mode").value;
  const modeLabel = document.getElementById("mode").selectedOptions[0]?.textContent || mode;
  const grid = document.getElementById("recordGrid");
  const detail = document.getElementById("recordDetail");

  document.getElementById("recordTitle").textContent =
    `${modeLabel}・最高記録一覧`;

  grid.innerHTML = "";
  detail.textContent = "敵アイコンを押すと記録を表示します";

  const fragment = document.createDocumentFragment();

  const orderMap = {};
  Object.values(enemiesData).forEach((enemy, index) => {
    orderMap[normalize(enemy.name)] = index;
  });

  const sortedPool = [...quizPool].sort((a, b) => {
    const oa = orderMap[normalize(a.enemyName)] ?? 999999;
    const ob = orderMap[normalize(b.enemyName)] ?? 999999;
    return oa - ob;
  });

  sortedPool.forEach(entry => {
    const record = getEnemyRecord(mode, entry.enemyName);
    const cell = document.createElement("button");

    cell.type = "button";
    cell.className = "recordCell";
    cell.title = entry.enemyName;

    if (record.clears > 0 && record.bestHints === 0) {
      cell.classList.add("recordNoHint");
    } else if (record.clears > 0) {
      cell.classList.add("recordCleared");
    } else if (record.attempts > 0) {
      cell.classList.add("recordAttempted");
    }

    const image = document.createElement("img");
    image.src = getEnemyImagePath(entry.enemyName);
    image.alt = entry.enemyName;
    image.onerror = () => {
      image.onerror = null;
      image.src = "image/noimage.png";
    };

    cell.appendChild(image);
    cell.onclick = () => showEnemyRecord(entry.enemyName, entry.stages.length);
    fragment.appendChild(cell);
  });

  grid.appendChild(fragment);
}

function showEnemyRecord(enemyName, stageCount) {
  const mode = document.getElementById("mode").value;
  const record = getEnemyRecord(mode, enemyName);
  const detail = document.getElementById("recordDetail");

  let status = "未挑戦";

  if (record.clears > 0 && record.bestHints === 0) {
    status = "ヒントなしクリア";
  } else if (record.clears > 0) {
    status = "クリア済み";
  } else if (record.attempts > 0) {
    status = "挑戦済み・未クリア";
  }

  detail.innerHTML = `
    <div class="recordDetailTitle">
      <img
        src="${getEnemyImagePath(enemyName)}"
        alt="${escapeRecordHTML(enemyName)}"
        onerror="this.src='image/noimage.png'"
      >
      <span>${escapeRecordHTML(enemyName)}</span>
    </div>
    <div class="recordDetailRow">状態：${status}</div>
    <div class="recordDetailRow">対象ステージ数：${stageCount}</div>
    <div class="recordDetailRow">挑戦数：${record.attempts}</div>
    <div class="recordDetailRow">クリア数：${record.clears}</div>
    <div class="recordDetailRow">
      最高記録：
      ${
        record.clears > 0
          ? `ヒント ${record.bestHints}回 ／ タイム ${formatTime(record.bestTime)}`
          : "記録なし"
      }
    </div>
  `;

  detail.scrollIntoView({
    behavior: "smooth",
    block: "start"
  });
}
  
function escapeRecordHTML(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function normalize(value) {
  return String(value ?? "")
    .normalize("NFKC")
    .replace(/\[EX\]/gi, "")
    .replace(/\r?\n/g, "")
    .replace(/[：:]/g, "")
    .replace(/[～〜]/g, "〜")
    .replace(/[ 　]/g, "")
    .trim()
    .toLowerCase();
}

function normalizeSearch(value) {
  return normalize(value)
    .replace(/[ァ-ヶ]/g, char =>
      String.fromCharCode(char.charCodeAt(0) - 0x60)
    );
}

function getEnemyFileName(name) {
  return String(name)
    .replace(/\r?\n/g, "")
    .trim()
    .replace(/[：:]/g, " ")
    .replace(/[ 　]+/g, "");
}

function getEnemyImagePath(name) {
  return "image/" + encodeURIComponent(getEnemyFileName(name)) + ".png";
}

function isTargetChapter(chapter, mode) {
  const id = String(chapter.chapterId || "");

  return (
    mode === "ALL" ||
    (
      mode === "N" &&
      (
        (id.startsWith("N") && !id.startsWith("NA") && !id.startsWith("ND")) ||
        id === "E026"
      )
    ) ||
    (
      mode === "NA" &&
      (id.startsWith("NA") || id === "E068" || id === "E069")
    ) ||
    (mode === "ND" && id.startsWith("ND"))
  );
}

function makeStageKey(stage) {
  return `${stage.chapterId}-${stage.stageId}`;
}

function getStageLabel(stage) {
  return `${stage.chapterId}-${stage.stageId} ${stage.chapterName}-${stage.stageName}`;
}


function formatTime(totalSeconds) {
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;

  return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
}

function updateTimerView() {
  document.getElementById("timer").textContent =
    `タイム: ${formatTime(elapsedSeconds)}`;
}

function updateHintCountView() {
  document.getElementById("hintCount").textContent =
    `ヒント: ${hintUseCount}回`;
}

function startQuestionTimer() {
  stopQuestionTimer();

  elapsedSeconds = 0;
  questionStartTime = Date.now();
  updateTimerView();

  timerId = setInterval(() => {
    elapsedSeconds = Math.floor((Date.now() - questionStartTime) / 1000);
    updateTimerView();
  }, 250);
}

function stopQuestionTimer() {
  if (timerId !== null) {
    clearInterval(timerId);
    timerId = null;
  }

  if (questionStartTime) {
    elapsedSeconds = Math.floor((Date.now() - questionStartTime) / 1000);
    updateTimerView();
  }
}

function buildQuizPool() {
  const mode = document.getElementById("mode").value;
  const enemyMap = new Map();
  const candidateMap = new Map();

  stagesData.forEach(chapter => {
    if (!isTargetChapter(chapter, mode)) return;

    (chapter.stages || []).forEach(stage => {
      const stageInfo = {
        chapterId: String(chapter.chapterId),
        chapterName: String(chapter.chapterName || ""),
        stageId: String(stage.stageId),
        stageName: String(stage.stageName || ""),
        enemies: Array.isArray(stage.enemies) ? stage.enemies.map(String) : []
      };

      candidateMap.set(makeStageKey(stageInfo), stageInfo);

      const uniqueEnemies = new Set(
        (stage.enemies || [])
          .filter(name => normalize(name) !== normalize("カンバン娘"))
          .map(name => String(name))
      );

      uniqueEnemies.forEach(enemyName => {
        const enemyKey = normalize(enemyName);

        if (!enemyMap.has(enemyKey)) {
          enemyMap.set(enemyKey, {
            enemyName,
            stages: [],
            stageKeySet: new Set()
          });
        }

        const entry = enemyMap.get(enemyKey);
        const stageKey = makeStageKey(stageInfo);

        if (!entry.stageKeySet.has(stageKey)) {
          entry.stageKeySet.add(stageKey);
          entry.stages.push(stageInfo);
        }
      });
    });
  });

  quizPool = [...enemyMap.values()]
    .map(entry => ({
      enemyName: entry.enemyName,
      stages: entry.stages
    }))
    .filter(entry => entry.stages.length > 0);

  allStageCandidates = [...candidateMap.values()];
}

function pickRandomQuestion() {
  if (quizPool.length === 0) return null;

  let candidates = quizPool;

  if (current && quizPool.length > 1) {
    candidates = quizPool.filter(
      item => normalize(item.enemyName) !== normalize(current.enemyName)
    );
  }

  return candidates[Math.floor(Math.random() * candidates.length)];
}

function newQuestion() {
  if (current && !questionFinished && !currentAttemptSaved) {
    saveCurrentAttempt(false);
  } else {
    stopQuestionTimer();
  }

  current = pickRandomQuestion();
  answeredKeys = new Set();
  questionFinished = false;
  currentAttemptSaved = false;
  hintUseCount = 0;
  currentHints = [];
  document.getElementById("persistentHint").innerHTML = "";

  updateHintCountView();

  document.getElementById("result").textContent = "";
  document.getElementById("remainingBox").classList.add("hidden");
  document.getElementById("remainingList").innerHTML = "";
  document.getElementById("nextBtn").classList.add("hidden");
  document.getElementById("checkBtn").disabled = false;
  document.getElementById("hintBtn").disabled = false;
  document.getElementById("giveUpBtn").disabled = false;
  document.getElementById("answer").disabled = false;

  clearAnswer();

  if (!current) {
    document.getElementById("enemyName").textContent = "出題できる敵がいません";
    document.getElementById("enemyImage").src = "image/noimage.png";
    document.getElementById("progress").textContent = "";
    return;
  }

  const image = document.getElementById("enemyImage");
  image.src = getEnemyImagePath(current.enemyName);
  image.onerror = () => {
    image.onerror = null;
    image.src = "image/noimage.png";
  };

  document.getElementById("enemyName").textContent = current.enemyName;
  updateProgress();
  renderAnsweredList();
  startQuestionTimer();
  document.getElementById("answer").focus();
}

function updateProgress() {
  if (!current) return;

  document.getElementById("progress").textContent =
    `${answeredKeys.size} / ${current.stages.length} ステージ回答済み`;
}

function renderAnsweredList() {
  const list = document.getElementById("answeredList");
  list.innerHTML = "";

  if (!current || answeredKeys.size === 0) {
    const li = document.createElement("li");
    li.textContent = "まだありません";
    li.style.color = "#777";
    list.appendChild(li);
    return;
  }

  current.stages
    .filter(stage => answeredKeys.has(makeStageKey(stage)))
    .forEach(stage => {
      const li = document.createElement("li");
      li.textContent = getStageLabel(stage);
      list.appendChild(li);
    });
}

function findMatchedStages(input) {
  if (!current) return [];

  const inputKey = normalize(input);
  if (!inputKey) return [];

  return current.stages.filter(stage => {
    const idText = `${stage.chapterId}-${stage.stageId}`;

    return (
      normalize(stage.stageName) === inputKey ||
      normalize(idText) === inputKey ||
      normalize(getStageLabel(stage)) === inputKey
    );
  });
}

function checkAnswer() {
  if (!current || questionFinished) return;

  hideSuggest();

  const input = document.getElementById("answer").value;
  const matched = findMatchedStages(input);
  const result = document.getElementById("result");

  if (matched.length === 0) {
    result.textContent = "不正解です";
    result.style.color = "#d32f2f";
    return;
  }

  const newMatches = matched.filter(
    stage => !answeredKeys.has(makeStageKey(stage))
  );

  if (newMatches.length === 0) {
    result.textContent = "そのステージは回答済みです";
    result.style.color = "#e38b00";
    return;
  }

  newMatches.forEach(stage => answeredKeys.add(makeStageKey(stage)));

  const answeredNowKeys = new Set(
    newMatches.map(stage => makeStageKey(stage))
  );

  currentHints = currentHints.filter(hint =>
    !answeredNowKeys.has(hint.stageKey)
  );

  renderPersistentHints();

  result.textContent =
    newMatches.length === 1
      ? `正解：${getStageLabel(newMatches[0])}`
      : `正解：同名の${newMatches.length}ステージを回答済みにしました`;
  result.style.color = "#168139";

  clearAnswer();
  updateProgress();
  renderAnsweredList();

  if (answeredKeys.size === current.stages.length) {
    completeQuestion();
  }
}

function completeQuestion() {
  questionFinished = true;
  saveCurrentAttempt(true);
  score++;

  if (score > bestScore) {
    bestScore = score;
    saveBest();
  }

  document.getElementById("result").textContent =
    `全${current.stages.length}ステージ正解！ 🎉
タイム: ${formatTime(elapsedSeconds)}　ヒント: ${hintUseCount}回`;
  document.getElementById("result").style.color = "#168139";

  document.getElementById("checkBtn").disabled = true;
  document.getElementById("hintBtn").disabled = true;
  document.getElementById("giveUpBtn").disabled = true;
  document.getElementById("answer").disabled = true;
  document.getElementById("nextBtn").classList.remove("hidden");

  updateScoreView();
}

function showHint() {
  if (!current || questionFinished) return;

  const hintArea = document.getElementById("persistentHint");

  // 回答済みになったヒントを整理
  currentHints = currentHints.filter(hint =>
    !answeredKeys.has(hint.stageKey)
  );

  // 最大3件まで
  if (currentHints.length >= 3) {
    renderPersistentHints();

    const notice = document.createElement("div");
    notice.textContent = "ヒントは最大3つまで保持できます";
    notice.style.marginTop = "6px";
    notice.style.color = "#e38b00";

    hintArea.appendChild(notice);
    return;
  }

  const remaining = current.stages.filter(
    stage => !answeredKeys.has(makeStageKey(stage))
  );

  if (remaining.length === 0) return;

  const candidates = [];
  const currentEnemyKey = normalize(current.enemyName);
  const kanbanKey = normalize("カンバン娘");

  remaining.forEach(stage => {
    const stageKey = makeStageKey(stage);

    // すでにヒント対象になっているステージは除外
    if (currentHints.some(hint => hint.stageKey === stageKey)) {
      return;
    }

    (stage.enemies || []).forEach(enemyName => {
      const enemyKey = normalize(enemyName);

      if (!enemyKey) return;
      if (enemyKey === currentEnemyKey) return;
      if (enemyKey === kanbanKey) return;

      // 同じ敵のヒント重複を避ける
      if (
        currentHints.some(hint =>
          normalize(hint.enemyName) === enemyKey
        )
      ) {
        return;
      }

      candidates.push({
        enemyName: String(enemyName),
        stageKey
      });
    });
  });

  if (candidates.length === 0) {
    renderPersistentHints();

    const notice = document.createElement("div");
    notice.textContent =
      "これ以上、表示できる別のヒントはありません";
    notice.style.marginTop = "6px";

    hintArea.appendChild(notice);
    return;
  }

  const selected =
    candidates[Math.floor(Math.random() * candidates.length)];

  currentHints.push(selected);

  hintUseCount++;
  updateHintCountView();

  renderPersistentHints();
}
  
  function renderPersistentHints() {
  const hintArea = document.getElementById("persistentHint");

  // 回答済みになったヒントを除外
  currentHints = currentHints.filter(hint =>
    !answeredKeys.has(hint.stageKey)
  );

  hintArea.innerHTML = "";

  if (currentHints.length === 0) {
    return;
  }

  const title = document.createElement("div");
  title.className = "hintTitle";
  title.textContent =
    `ヒント：未回答ステージに登場する別の敵（${currentHints.length}/3）`;

  hintArea.appendChild(title);

  currentHints.forEach((hint, index) => {
    const enemyBox = document.createElement("div");
    enemyBox.className = "hintEnemy";

    const number = document.createElement("strong");
    number.textContent = `${index + 1}.`;

    const image = document.createElement("img");
    image.src = getEnemyImagePath(hint.enemyName);
    image.alt = hint.enemyName;

    image.onerror = () => {
      image.onerror = null;
      image.src = "image/noimage.png";
    };

    const name = document.createElement("span");
    name.textContent = hint.enemyName;

    enemyBox.appendChild(number);
    enemyBox.appendChild(image);
    enemyBox.appendChild(name);
    hintArea.appendChild(enemyBox);
  });
}
  
function giveUp() {
  if (!current || questionFinished) return;
  if (!confirm("残りの正解を表示しますか？\n連続クリア数は0に戻ります。")) return;

  questionFinished = true;
  saveCurrentAttempt(false);
  score = 0;
  updateScoreView();

  const remaining = current.stages.filter(
    stage => !answeredKeys.has(makeStageKey(stage))
  );

  const list = document.getElementById("remainingList");
  list.innerHTML = "";

  remaining.forEach(stage => {
    const li = document.createElement("li");
    li.textContent = getStageLabel(stage);
    list.appendChild(li);
  });

  document.getElementById("remainingBox").classList.remove("hidden");
  document.getElementById("result").textContent =
    `ギブアップ：残り${remaining.length}ステージ
タイム: ${formatTime(elapsedSeconds)}　ヒント: ${hintUseCount}回`;
  document.getElementById("result").style.color = "#d32f2f";

  document.getElementById("checkBtn").disabled = true;
  document.getElementById("hintBtn").disabled = true;
  document.getElementById("giveUpBtn").disabled = true;
  document.getElementById("answer").disabled = true;
  document.getElementById("nextBtn").classList.remove("hidden");
}

function clearAnswer() {
  const input = document.getElementById("answer");
  input.value = "";
  hideSuggest();

  if (!input.disabled) input.focus();
}

function buildSuggestions() {
  if (!current || questionFinished) {
    hideSuggest();
    return;
  }

  const input = document.getElementById("answer").value;
  const keyword = normalizeSearch(input);

  if (!keyword) {
    hideSuggest();
    return;
  }

  const seen = new Set();
  const results = [];

  allStageCandidates.forEach(stage => {
    const stageName = String(stage.stageName || "");

    if (!normalizeSearch(stageName).includes(keyword)) return;

    const key = normalize(stageName);
    if (!key || seen.has(key)) return;

    seen.add(key);
    results.push(stage);
  });

  currentSuggestList = results.slice(0, 20);
  suggestIndex = -1;

  renderSuggestions();
}

function renderSuggestions() {
  const suggest = document.getElementById("suggest");
  suggest.innerHTML = "";

  if (currentSuggestList.length === 0) {
    suggest.style.display = "none";
    return;
  }

  currentSuggestList.forEach((stage, index) => {
    const div = document.createElement("div");
    div.className = "suggestItem";
    div.textContent = stage.stageName;

    if (index === suggestIndex) {
      div.classList.add("active");
    }

    div.onclick = () => selectSuggestion(index);
    suggest.appendChild(div);
  });

  suggest.style.display = "block";
}

function selectSuggestion(index) {
  const stage = currentSuggestList[index];
  if (!stage) return;

  document.getElementById("answer").value = stage.stageName;
  hideSuggest();
  document.getElementById("answer").focus();
}

function hideSuggest() {
  document.getElementById("suggest").innerHTML = "";
  document.getElementById("suggest").style.display = "none";
  currentSuggestList = [];
  suggestIndex = -1;
}

function updateSuggestionSelection() {
  document.querySelectorAll(".suggestItem").forEach((item, index) => {
    item.classList.toggle("active", index === suggestIndex);

    if (index === suggestIndex) {
      item.scrollIntoView({ block: "nearest" });
    }
  });
}

function getBestKey() {
  return `enemyAllStagesQuizBest_${document.getElementById("mode").value}`;
}

function loadBest() {
  bestScore = Number(localStorage.getItem(getBestKey())) || 0;
  updateScoreView();
}

function saveBest() {
  localStorage.setItem(getBestKey(), String(bestScore));
}

function updateScoreView() {
  document.getElementById("score").textContent = `連続クリア: ${score}`;
  document.getElementById("best").textContent = `最高記録: ${bestScore}`;
}

function changeMode() {
  // レジェンド範囲を切り替えただけでは未クリア記録にしない
  stopQuestionTimer();

  // 切り替え前の問題を保存済み扱いにして、
  // newQuestion()で黄色記録が付かないようにする
  currentAttemptSaved = true;

  score = 0;
  buildQuizPool();
  loadBest();
  newQuestion();
}

async function init() {
  try {
    const [loadedStages, loadedEnemies] = await Promise.all([
      fetch("stages.json").then(response => {
        if (!response.ok) {
          throw new Error(`stages.jsonの読み込みに失敗しました: ${response.status}`);
        }
        return response.json();
      }),

      fetch("enemies.json").then(response => {
        if (!response.ok) {
          throw new Error(`enemies.jsonの読み込みに失敗しました: ${response.status}`);
        }
        return response.json();
      })
    ]);

    stagesData = loadedStages;
    enemiesData = loadedEnemies;

    buildQuizPool();
    loadBest();

    document.getElementById("loading").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    const answer = document.getElementById("answer");
    answer.addEventListener("input", buildSuggestions);

    answer.addEventListener("keydown", event => {
      if (event.isComposing || event.keyCode === 229) return;

      if (event.key === "ArrowDown" && currentSuggestList.length > 0) {
        event.preventDefault();
        suggestIndex = (suggestIndex + 1) % currentSuggestList.length;
        updateSuggestionSelection();
        return;
      }

      if (event.key === "ArrowUp" && currentSuggestList.length > 0) {
        event.preventDefault();
        suggestIndex =
          (suggestIndex - 1 + currentSuggestList.length) % currentSuggestList.length;
        updateSuggestionSelection();
        return;
      }

      if (event.key === "Enter") {
        event.preventDefault();

        if (suggestIndex >= 0 && currentSuggestList[suggestIndex]) {
          selectSuggestion(suggestIndex);
          return;
        }

        checkAnswer();
      }
    });

    document.addEventListener("click", event => {
      if (!event.target.closest(".answerWrap")) {
        hideSuggest();
      }
    });

    newQuestion();

  } catch (error) {
    console.error(error);
    document.getElementById("loading").textContent =
      "データの読み込みに失敗しました。stages.jsonの配置を確認してください。";
  }
}

init();
</script>
