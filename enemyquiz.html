<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>敵から全ステージ当てクイズ</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 16px;
  font-family: sans-serif;
  background: #f5f6fa;
  color: #222;
}

.container {
  width: min(760px, 100%);
  margin: 0 auto;
  background: white;
  border-radius: 14px;
  padding: 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}

h1 {
  font-size: 24px;
  margin: 0 0 16px;
}

.topRow,
.statusRow,
.answerRow,
.buttonRow {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

select,
input,
button {
  font-size: 16px;
}

select,
input {
  min-height: 44px;
  padding: 8px 12px;
  border: 1px solid #bbb;
  border-radius: 9px;
  background: white;
}

select {
  min-width: 180px;
}

.statusRow {
  margin-top: 14px;
  padding: 10px;
  border-radius: 9px;
  background: #f3f5f8;
  font-weight: bold;
}

.statusItem {
  min-width: 130px;
}

.question {
  margin-top: 18px;
  padding: 18px;
  border: 1px solid #ddd;
  border-radius: 12px;
  text-align: center;
  background: #fafafa;
}

#enemyImage {
  width: 100px;
  height: 100px;
  object-fit: contain;
}

#enemyName {
  margin-top: 8px;
  font-size: 22px;
  font-weight: bold;
}

#progress {
  margin-top: 8px;
  font-weight: bold;
}

.answerWrap {
  position: relative;
  flex: 1 1 360px;
}

#answer {
  width: 100%;
  padding-right: 44px;
}

.clearBtn {
  position: absolute;
  right: 5px;
  top: 5px;
  width: 34px;
  height: 34px;
  padding: 0;
  border: 0;
  border-radius: 7px;
  background: #eee;
  cursor: pointer;
}

.answerRow {
  margin-top: 16px;
}

button {
  min-height: 42px;
  padding: 8px 15px;
  border: 1px solid #bbb;
  border-radius: 9px;
  background: #f5f5f5;
  cursor: pointer;
}

button:hover {
  background: #e8e8e8;
}

.primary {
  border-color: #4CAF50;
  background: #4CAF50;
  color: white;
}

.primary:hover {
  background: #409344;
}

.danger {
  border-color: #d9534f;
  background: white;
  color: #c9302c;
}

#suggest {
  position: absolute;
  left: 0;
  right: 0;
  top: 46px;
  z-index: 20;
  max-height: 220px;
  overflow-y: auto;
  background: white;
  border: 1px solid #bbb;
  border-radius: 8px;
  box-shadow: 0 5px 15px rgba(0,0,0,.12);
  display: none;
}

.suggestItem {
  padding: 9px 11px;
  cursor: pointer;
  text-align: left;
}

.suggestItem:hover,
.suggestItem.active {
  background: #dceeff;
}

#result {
  min-height: 28px;
  margin-top: 12px;
  font-weight: bold;
}

.ok {
  color: #16803c;
}

.ng {
  color: #c62828;
}

.panel {
  margin-top: 14px;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 10px;
  background: #fafafa;
}

.panel h2 {
  margin: 0 0 8px;
  font-size: 18px;
}

#answeredList,
#hintArea,
#answerList {
  line-height: 1.7;
}

.hintEnemy {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}

.hintEnemy img {
  width: 48px;
  height: 48px;
  object-fit: contain;
}

.stageItem {
  padding: 4px 0;
  border-bottom: 1px dashed #ddd;
}

.stageItem:last-child {
  border-bottom: 0;
}

.hidden {
  display: none;
}

@media (max-width: 560px) {
  body {
    padding: 8px;
  }

  .container {
    padding: 13px;
  }

  h1 {
    font-size: 21px;
  }

  select {
    width: 100%;
  }

  .statusItem {
    min-width: 0;
    width: 100%;
  }

  .answerRow > button {
    flex: 1;
  }
}
</style>
</head>

<body>
<div class="container">
  <h1>敵から全ステージ当てクイズ</h1>

  <div class="topRow">
    <select id="mode" onchange="changeMode()">
      <option value="ALL">全て</option>
      <option value="N">レジェンド</option>
      <option value="NA">真レジェンド</option>
      <option value="ND">レジェンド0</option>
    </select>

    <button type="button" onclick="newQuestion()">別の敵を出題</button>
  </div>

  <div class="statusRow">
    <div class="statusItem" id="timer">タイム：00:00</div>
    <div class="statusItem" id="hintCount">ヒント：0回</div>
    <div class="statusItem" id="remainingCount">残り：0</div>
  </div>

  <div class="question">
    <img id="enemyImage" src="image/noimage.png" alt="">
    <div id="enemyName">読み込み中...</div>
    <div id="progress"></div>
  </div>

  <div class="answerRow">
    <div class="answerWrap">
      <input
        id="answer"
        type="text"
        placeholder="ステージ名を入力"
        autocomplete="off"
      >
      <button type="button" class="clearBtn" onclick="clearAnswer()">×</button>
      <div id="suggest"></div>
    </div>

    <button type="button" class="primary" onclick="checkAnswer()">回答</button>
  </div>

  <div class="buttonRow" style="margin-top:10px;">
    <button type="button" onclick="showHint()">ヒント</button>
    <button type="button" class="danger" onclick="giveUp()">ギブアップ</button>
  </div>

  <div id="result"></div>

  <div class="panel">
    <h2>回答済みステージ</h2>
    <div id="answeredList">まだありません</div>
  </div>

  <div class="panel hidden" id="hintPanel">
    <h2>ヒント</h2>
    <div id="hintArea"></div>
  </div>

  <div class="panel hidden" id="answerPanel">
    <h2>正解一覧</h2>
    <div id="answerList"></div>
  </div>
</div>

<script>
let stagesData = [];
let quizPool = [];
let currentQuestion = null;

let answeredStageKeys = new Set();
let stageSuggestionNames = [];
let currentSuggestList = [];
let suggestIndex = -1;

let timerId = null;
let questionStartTime = 0;
let elapsedSeconds = 0;
let hintUseCount = 0;
let usedHintEnemies = new Set();
let questionFinished = false;

function normalize(str) {
  return String(str ?? "")
    .replace(/\[EX\]/gi, "")
    .replace(/\r?\n/g, "")
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
    )
    .replace(/[～〜]/g, "〜")
    .replace(/[：:]/g, "")
    .replace(/[ 　]+/g, "")
    .toLowerCase()
    .trim();
}

function normalizeSearch(str) {
  return normalize(str)
    .replace(/[ァ-ヶ]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0x60)
    );
}

function isTargetChapter(ch, mode) {
  return (
    mode === "ALL" ||

    (mode === "N" && (
      (
        ch.chapterId.startsWith("N") &&
        !ch.chapterId.startsWith("NA") &&
        !ch.chapterId.startsWith("ND")
      ) ||
      ch.chapterId === "E026"
    )) ||

    (mode === "NA" && (
      ch.chapterId.startsWith("NA") ||
      ch.chapterId === "E068" ||
      ch.chapterId === "E069"
    )) ||

    (mode === "ND" && ch.chapterId.startsWith("ND"))
  );
}

function getStageKey(stage) {
  return `${stage.chapterId}-${stage.stageId}`;
}

function getEnemyImagePath(enemyName) {
  const fileName = String(enemyName)
    .replace(/\r?\n/g, "")
    .trim()
    .replace(/[：:]/g, " ")
    .replace(/[ 　]+/g, "");

  return "image/" + encodeURIComponent(fileName) + ".png";
}

async function init() {
  try {
    stagesData = await fetch("stages.json").then(r => {
      if (!r.ok) throw new Error("stages.jsonを読み込めませんでした");
      return r.json();
    });

    setupInputEvents();
    buildQuizPool();
    newQuestion();
  } catch (error) {
    console.error(error);
    document.getElementById("enemyName").textContent =
      "stages.jsonの読み込みに失敗しました";
    setResult(error.message, false);
  }
}

function buildQuizPool() {
  const mode = document.getElementById("mode").value;
  const enemyMap = new Map();
  const suggestionMap = new Map();

  stagesData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach(st => {
      const stageData = {
        chapterId: ch.chapterId,
        chapterName: ch.chapterName,
        stageId: st.stageId,
        stageName: st.stageName,
        enemies: Array.isArray(st.enemies) ? st.enemies : []
      };

      const suggestionKey = normalize(stageData.stageName);
      if (!suggestionMap.has(suggestionKey)) {
        suggestionMap.set(suggestionKey, stageData.stageName);
      }

      stageData.enemies.forEach(enemyName => {
        if (normalize(enemyName) === normalize("カンバン娘")) return;

        const enemyKey = normalize(enemyName);
        if (!enemyKey) return;

        if (!enemyMap.has(enemyKey)) {
          enemyMap.set(enemyKey, {
            enemyName,
            stages: []
          });
        }

        const question = enemyMap.get(enemyKey);
        const duplicate = question.stages.some(stage =>
          getStageKey(stage) === getStageKey(stageData)
        );

        if (!duplicate) {
          question.stages.push(stageData);
        }
      });
    });
  });

  quizPool = [...enemyMap.values()]
    .filter(question => question.stages.length > 0);

  stageSuggestionNames = [...suggestionMap.values()];
}

function changeMode() {
  buildQuizPool();
  newQuestion();
}

function newQuestion() {
  stopTimer();

  if (quizPool.length === 0) {
    currentQuestion = null;
    document.getElementById("enemyName").textContent = "出題できる敵がいません";
    document.getElementById("enemyImage").src = "image/noimage.png";
    return;
  }

  let next = quizPool[Math.floor(Math.random() * quizPool.length)];

  if (quizPool.length >= 2 && currentQuestion) {
    let guard = 0;
    while (
      normalize(next.enemyName) === normalize(currentQuestion.enemyName) &&
      guard < 30
    ) {
      next = quizPool[Math.floor(Math.random() * quizPool.length)];
      guard++;
    }
  }

  currentQuestion = next;
  answeredStageKeys = new Set();
  usedHintEnemies = new Set();
  hintUseCount = 0;
  questionFinished = false;

  document.getElementById("enemyName").textContent = currentQuestion.enemyName;

  const enemyImage = document.getElementById("enemyImage");
  enemyImage.src = getEnemyImagePath(currentQuestion.enemyName);
  enemyImage.alt = currentQuestion.enemyName;
  enemyImage.onerror = () => {
    enemyImage.src = "image/noimage.png";
  };

  document.getElementById("hintPanel").classList.add("hidden");
  document.getElementById("answerPanel").classList.add("hidden");
  document.getElementById("hintArea").innerHTML = "";
  document.getElementById("answerList").innerHTML = "";
  document.getElementById("answeredList").textContent = "まだありません";
  document.getElementById("result").textContent = "";

  clearAnswer();
  updateStatus();
  startTimer();

  document.getElementById("answer").focus();
}

function startTimer() {
  elapsedSeconds = 0;
  questionStartTime = Date.now();
  renderTimer();

  timerId = setInterval(() => {
    elapsedSeconds = Math.floor((Date.now() - questionStartTime) / 1000);
    renderTimer();
  }, 250);
}

function stopTimer() {
  if (timerId !== null) {
    clearInterval(timerId);
    timerId = null;
  }

  if (questionStartTime) {
    elapsedSeconds = Math.floor((Date.now() - questionStartTime) / 1000);
    renderTimer();
  }
}

function renderTimer() {
  const minutes = Math.floor(elapsedSeconds / 60);
  const seconds = elapsedSeconds % 60;

  document.getElementById("timer").textContent =
    `タイム：${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
}

function updateStatus() {
  const total = currentQuestion ? currentQuestion.stages.length : 0;
  const answered = answeredStageKeys.size;
  const remaining = Math.max(0, total - answered);

  document.getElementById("hintCount").textContent =
    `ヒント：${hintUseCount}回`;

  document.getElementById("remainingCount").textContent =
    `残り：${remaining}`;

  document.getElementById("progress").textContent =
    `${answered} / ${total} ステージ回答済み`;
}

function setupInputEvents() {
  const input = document.getElementById("answer");

  input.addEventListener("input", updateSuggestions);

  input.addEventListener("keydown", event => {
    if (event.isComposing || event.keyCode === 229) return;

    if (event.key === "ArrowDown") {
      if (currentSuggestList.length === 0) return;
      event.preventDefault();
      suggestIndex = (suggestIndex + 1) % currentSuggestList.length;
      updateSuggestionActive();
      return;
    }

    if (event.key === "ArrowUp") {
      if (currentSuggestList.length === 0) return;
      event.preventDefault();
      suggestIndex =
        (suggestIndex - 1 + currentSuggestList.length) %
        currentSuggestList.length;
      updateSuggestionActive();
      return;
    }

    if (event.key === "Enter") {
      event.preventDefault();

      if (suggestIndex >= 0 && currentSuggestList[suggestIndex]) {
        selectSuggestion(currentSuggestList[suggestIndex]);
      } else {
        checkAnswer();
      }
    }
  });

  document.addEventListener("click", event => {
    const wrap = document.querySelector(".answerWrap");
    if (!wrap.contains(event.target)) {
      closeSuggestions();
    }
  });
}

function updateSuggestions() {
  const input = document.getElementById("answer");
  const keyword = normalizeSearch(input.value);
  const suggest = document.getElementById("suggest");

  suggest.innerHTML = "";
  currentSuggestList = [];
  suggestIndex = -1;

  if (!keyword || questionFinished) {
    suggest.style.display = "none";
    return;
  }

  currentSuggestList = stageSuggestionNames
    .filter(stageName =>
      normalizeSearch(stageName).includes(keyword)
    )
    .slice(0, 20);

  if (currentSuggestList.length === 0) {
    suggest.style.display = "none";
    return;
  }

  currentSuggestList.forEach(stageName => {
    const item = document.createElement("div");
    item.className = "suggestItem";
    item.textContent = stageName;
    item.onclick = () => selectSuggestion(stageName);
    suggest.appendChild(item);
  });

  suggest.style.display = "block";
}

function updateSuggestionActive() {
  document.querySelectorAll(".suggestItem").forEach((item, index) => {
    item.classList.toggle("active", index === suggestIndex);

    if (index === suggestIndex) {
      item.scrollIntoView({ block: "nearest" });
    }
  });
}

function selectSuggestion(stageName) {
  document.getElementById("answer").value = stageName;
  closeSuggestions();
  document.getElementById("answer").focus();
}

function closeSuggestions() {
  document.getElementById("suggest").style.display = "none";
  document.getElementById("suggest").innerHTML = "";
  currentSuggestList = [];
  suggestIndex = -1;
}

function clearAnswer() {
  const input = document.getElementById("answer");
  input.value = "";
  closeSuggestions();
  input.focus();
}

function checkAnswer() {
  if (!currentQuestion || questionFinished) return;

  const input = document.getElementById("answer");
  const value = input.value.trim();

  if (!value) {
    setResult("ステージ名を入力してください", false);
    return;
  }

  const normalizedInput = normalize(value);

  const matchedStage = currentQuestion.stages.find(stage => {
    const stageKey = getStageKey(stage);

    return (
      !answeredStageKeys.has(stageKey) &&
      (
        normalize(stage.stageName) === normalizedInput ||
        normalize(stageKey) === normalizedInput
      )
    );
  });

  if (!matchedStage) {
    const alreadyAnswered = currentQuestion.stages.some(stage => {
      const stageKey = getStageKey(stage);

      return (
        answeredStageKeys.has(stageKey) &&
        (
          normalize(stage.stageName) === normalizedInput ||
          normalize(stageKey) === normalizedInput
        )
      );
    });

    setResult(
      alreadyAnswered
        ? "そのステージは回答済みです"
        : "不正解です",
      false
    );

    input.select();
    return;
  }

  answeredStageKeys.add(getStageKey(matchedStage));
  renderAnsweredStages();
  updateStatus();
  clearAnswer();

  if (answeredStageKeys.size === currentQuestion.stages.length) {
    completeQuestion();
  } else {
    setResult("正解です", true);
  }
}

function renderAnsweredStages() {
  if (!currentQuestion || answeredStageKeys.size === 0) {
    document.getElementById("answeredList").textContent = "まだありません";
    return;
  }

  const answered = currentQuestion.stages
    .filter(stage => answeredStageKeys.has(getStageKey(stage)));

  document.getElementById("answeredList").innerHTML =
    answered.map(stage => `
      <div class="stageItem">
        ${escapeHTML(stage.chapterName)}－${escapeHTML(stage.stageName)}
      </div>
    `).join("");
}

function completeQuestion() {
  questionFinished = true;
  stopTimer();
  closeSuggestions();

  const timeText = formatTime(elapsedSeconds);

  setResult(
    `全ステージ正解！ タイム ${timeText}／ヒント ${hintUseCount}回`,
    true
  );

  document.getElementById("answerPanel").classList.remove("hidden");
  renderCorrectAnswerList();

  updateStatus();
}

function showHint() {
  if (!currentQuestion || questionFinished) return;

  const unansweredStages = currentQuestion.stages.filter(stage =>
    !answeredStageKeys.has(getStageKey(stage))
  );

  const candidates = [];

  unansweredStages.forEach(stage => {
    stage.enemies.forEach(enemyName => {
      const enemyKey = normalize(enemyName);

      if (
        enemyKey === normalize(currentQuestion.enemyName) ||
        enemyKey === normalize("カンバン娘") ||
        usedHintEnemies.has(enemyKey)
      ) {
        return;
      }

      candidates.push({
        enemyName,
        stageKey: getStageKey(stage)
      });
    });
  });

  if (candidates.length === 0) {
    document.getElementById("hintPanel").classList.remove("hidden");
    document.getElementById("hintArea").textContent =
      "これ以上、別の敵によるヒントはありません";
    return;
  }

  const selected =
    candidates[Math.floor(Math.random() * candidates.length)];

  usedHintEnemies.add(normalize(selected.enemyName));
  hintUseCount++;
  updateStatus();

  const panel = document.getElementById("hintPanel");
  const area = document.getElementById("hintArea");

  panel.classList.remove("hidden");

  area.innerHTML = `
    <div>未回答ステージのどれかに、この敵が登場します。</div>
    <div class="hintEnemy">
      <img
        src="${getEnemyImagePath(selected.enemyName)}"
        alt="${escapeHTML(selected.enemyName)}"
        onerror="this.src='image/noimage.png'"
      >
      <strong>${escapeHTML(selected.enemyName)}</strong>
    </div>
  `;
}

function giveUp() {
  if (!currentQuestion || questionFinished) return;

  const ok = confirm("ギブアップして正解一覧を表示しますか？");
  if (!ok) return;

  questionFinished = true;
  stopTimer();
  closeSuggestions();

  setResult(
    `ギブアップしました。タイム ${formatTime(elapsedSeconds)}／ヒント ${hintUseCount}回`,
    false
  );

  document.getElementById("answerPanel").classList.remove("hidden");
  renderCorrectAnswerList();
}

function renderCorrectAnswerList() {
  if (!currentQuestion) return;

  document.getElementById("answerList").innerHTML =
    currentQuestion.stages.map(stage => `
      <div class="stageItem">
        ${escapeHTML(stage.chapterId)}-${escapeHTML(stage.stageId)}
       　${escapeHTML(stage.chapterName)}－${escapeHTML(stage.stageName)}
      </div>
    `).join("");
}

function formatTime(seconds) {
  const minutes = Math.floor(seconds / 60);
  const remain = seconds % 60;

  return `${String(minutes).padStart(2, "0")}:${String(remain).padStart(2, "0")}`;
}

function setResult(message, isCorrect) {
  const result = document.getElementById("result");
  result.textContent = message;
  result.className = isCorrect ? "ok" : "ng";
}

function escapeHTML(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

init();
</script>
</body>
</html>
