<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵出現一覧１</title>
<style>
body { font-family: sans-serif; padding:20px; }
select, button { margin-right:10px; }

table { border-collapse: collapse; width:100%; }
th, td { border:1px solid #ccc; padding:5px; }
img { width:50px; cursor:pointer; }

th { cursor:pointer; }
</style>
</head>
<body>

<h2>敵出現一覧</h2>

<select id="mode" onchange="load()">
  <option value="N">レジェンド</option>
  <option value="NA">真レジェンド</option>
  <option value="ND">レジェンド0</option>
</select>

<button onclick="toggleSort()">並び順切替</button>

<table>
<thead>
<tr>
  <th>画像</th>
  <th>敵名</th>
  <th>登場回数</th>
  <th>初出ステージ</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let enemiesData = {};
let stagesData = [];
let desc = true;

  function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "") // ← 半角＆全角スペース削除
    .trim();
}

async function init() {
  enemiesData = await fetch("enemies.json").then(r=>r.json());
  stagesData = await fetch("stages.json").then(r=>r.json());

  load();
}

function load() {
  const mode = document.getElementById("mode").value;

  const map = {};

  stagesData.forEach(ch => {

  const isTarget =
    (mode === "N"  && /^N\d/.test(ch.chapterId)) ||
    (mode === "NA" && ch.chapterId.startsWith("NA")) ||
    (mode === "ND" && ch.chapterId.startsWith("ND"));

  if (!isTarget) return;

  ch.stages.forEach(st => {
  st.enemies.forEach(enemyName => {

    const key = normalize(enemyName);

    // 表示用（スペース統一：半角1個にする）
    const displayName = enemyName
      .replace(/\r?\n/g, "")
      .replace(/[ 　]+/g, " ")
      .trim();

    if (!map[key]) {
      map[key] = {
        name: displayName,
        count: 0,
        first: `${ch.chapterId}-${st.stageId} ${ch.chapterName}-${st.stageName}`
      };
    }

    map[key].count++;
  });
});

});
  
  let list = Object.keys(map).map(key => ({
  name: map[key].name,
  count: map[key].count,
  first: map[key].first
}));

  list.sort((a,b)=> desc ? b.count-a.count : a.count-b.count);

  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

 list.forEach(e => {

  const safeName = e.name
    .replace(/\r?\n/g, "")
    .trim();

  const imgPath = "image/" + encodeURIComponent(safeName) + ".png";

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><img src="${imgPath}" onclick="goDetail('${e.name}')"></td>
      <td>${e.name}</td>
      <td>${e.count}</td>
      <td>${e.first}</td>
    `;

    tbody.appendChild(tr);
  });
}

function toggleSort() {
  desc = !desc;
  load();
}

function goDetail(name) {
  const mode = document.getElementById("mode").value;
  location.href =
    "detail.html?name=" + encodeURIComponent(name) +
    "&mode=" + mode;
}

init();
</script>
</body>
</html>
