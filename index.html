<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵出現一覧1</title>

<style>
body { font-family: sans-serif; padding:20px; }

table { border-collapse: collapse; width:100%; }
th, td { border:1px solid #ccc; padding:5px; }
img { width:50px; cursor:pointer; }

th { cursor:pointer; }
</style>
</head>
<body>

<h2>敵出現一覧</h2>

<select id="mode" onchange="load()">
  <option value="N">レジェンド</option>
  <option value="NA">真レジェンド</option>
  <option value="ND">レジェンド0</option>
</select>

<button onclick="toggleSort()">並び順切替</button>

<table>
<thead>
<tr>
  <th>画像</th>
  <th>敵名</th>
  <th>登場回数</th>
  <th>初出ステージ</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let stagesData = [];
let desc = true;

// 比較専用（スペース無視）
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

async function init() {
  stagesData = await fetch("stages.json").then(r=>r.json());
  load();
}

function load() {
  const mode = document.getElementById("mode").value;
  const map = {};

  stagesData.forEach(ch => {

    const isTarget =
      (mode === "N"  && ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND")) ||
      (mode === "NA" && ch.chapterId.startsWith("NA")) ||
      (mode === "ND" && ch.chapterId.startsWith("ND"));

    if (!isTarget) return;

    ch.stages.forEach(st => {
      st.enemies.forEach(enemyName => {

        const key = normalize(enemyName);

        const displayName = enemyName;

        if (!map[key]) {
          map[key] = {
            name: enemyName,
            count: 0,
            first: `${ch.chapterId}-${st.stageId} ${ch.chapterName}-${st.stageName}`
          };
        }

        map[key].count++;
      });
    });

  });

  let list = Object.values(map);

  list.sort((a,b)=> desc ? b.count-a.count : a.count-b.count);

  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  list.forEach(e => {

  const safeName = e.name
    .replace(/\r?\n/g, "")
    .trim();

  const img = document.createElement("img");
  img.src = "image/" + encodeURIComponent(safeName) + ".png";
  img.onerror = () => img.src = "image/noimage.png";

  // ★ここ重要（確実に動くクリック）
  img.addEventListener("click", () => {
    const mode = document.getElementById("mode").value;

    const url = new URL("detail.html", location.href);
    url.searchParams.set("name", e.name);
    url.searchParams.set("mode", mode);

    window.location.href = url.toString();
  });

  const tr = document.createElement("tr");

  const tdImg = document.createElement("td");
  tdImg.appendChild(img);

  const tdName = document.createElement("td");
  tdName.textContent = e.name;

  const tdCount = document.createElement("td");
  tdCount.textContent = e.count;

  const tdFirst = document.createElement("td");
  tdFirst.textContent = e.first;

  tr.appendChild(tdImg);
  tr.appendChild(tdName);
  tr.appendChild(tdCount);
  tr.appendChild(tdFirst);

  tbody.appendChild(tr);
});
}

function toggleSort() {
  desc = !desc;
  load();
}

function goDetail(name) {
  const mode = document.getElementById("mode").value;

  const url = new URL("detail.html", location.href);
  url.searchParams.set("name", name);
  url.searchParams.set("mode", mode);

  location.href = url.toString();
}

init();
</script>

</body>
</html>
