<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵出現一覧</title>

<style>
body { font-family: sans-serif; padding:20px; }

table { border-collapse: collapse; width:100%; }
th, td { border:1px solid #ccc; padding:5px; }
img { width:50px; cursor:pointer; }

th { cursor:pointer; }
</style>
</head>
<body>

<h2>敵出現一覧</h2>

<select id="mode" onchange="load()">
  <option value="ALL">全て</option>
  <option value="N">レジェンド</option>
  <option value="NA">真レジェンド</option>
  <option value="ND" selected>レジェンド0</option>
</select>

<select id="sort" onchange="changeSort()">
  <option value="count">登場回数</option>
  <option value="first">初出ステージ順</option>
  <option value="order">図鑑順</option>
</select>

<select id="order" onchange="changeOrder()">
  <option value="desc">降順</option>
  <option value="asc">昇順</option>
</select>

<table>
<thead>
<tr>
  <th>画像</th>
  <th>敵名</th>
  <th>登場回数</th>
  <th>初出ステージ</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let stagesData = [];
let desc = true;
let enemiesData = {};
let sortMode = "count";
let orderMap = {};

async function init() {
  enemiesData = await fetch("enemies.json").then(r=>r.json());
  stagesData = await fetch("stages.json").then(r=>r.json());

  // 順番記録
  let i = 0;
  for (let key in enemiesData) {
    orderMap[enemiesData[key].name] = i++;
  }

  changeSort();
  load();
}

// 比較専用（スペース無視）
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

function load() {
  const mode = document.getElementById("mode").value;
  const map = {};

  stagesData.forEach(ch => {

    const isTarget =
  (mode === "ALL") ||

  (mode === "N" && (
    (ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND"))
    || ch.chapterId === "E026"
  )) ||

  (mode === "NA" && (
    ch.chapterId.startsWith("NA")
    || ch.chapterId === "E068"
    || ch.chapterId === "E069"
  )) ||

  (mode === "ND" && ch.chapterId.startsWith("ND"));

    if (!isTarget) return;

    ch.stages.forEach(st => {
      st.enemies.forEach(enemyName => {

        const key = normalize(enemyName);

        const displayName = enemyName
  .replace(/\r?\n/g, "")
  .replace(/[ 　\u00A0]+/g, " ") // ←これ追加（超重要）
  .trim();

        if (!map[key]) {
          map[key] = {
            name: enemyName,
            count: 0,
            first: `${ch.chapterId}-${st.stageId} ${ch.chapterName}-${st.stageName}`
          };
        }

        map[key].count++;
      });
    });

  });

let list = Object.values(map).map(e => {

  // "N000-0" → 数値化
  const match = e.first.match(/([A-Z]+)(\d+)-(\d+)/);

  let firstNum = 999999;

  if (match) {
    const prefix = match[1];
    const chap = parseInt(match[2]);
    const stage = parseInt(match[3]);

    // 種類ごとに重み
    const base =
      prefix === "N"  ? 0 :
      prefix === "NA" ? 100000 :
      prefix === "ND" ? 200000 :
      prefix === "E"  ? 300000 : 400000;

    firstNum = base + chap * 100 + stage;
  }

  return { ...e, firstNum };
});
  
 list.sort((a, b) => {

  if (sortMode === "count") {
    return desc ? b.count - a.count : a.count - b.count;
  }

  if (sortMode === "first") {
    return a.firstNum - b.firstNum; // 固定（昇順のみ）
  }

  if (sortMode === "order") {
    return (orderMap[a.name] ?? 99999) - (orderMap[b.name] ?? 99999);
  }

});

  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  list.forEach(e => {

  const baseName = e.name
  .replace(/\r?\n/g, "")
  .trim();

// ▼画像用
const fileName = baseName
  .replace(/[：:]/g, " ")   // ← ★ここ重要（全角＋半角対応）
  .replace(/[ 　]+/g, "");  // スペース削除
const img = document.createElement("img");
img.src = "image/" + encodeURIComponent(fileName) + ".png";

img.onerror = () => img.src = "image/noimage.png";

  // ★ここ重要（確実に動くクリック）
  img.addEventListener("click", () => {
    const mode = document.getElementById("mode").value;

    const url = new URL("detail.html", location.href);
    url.searchParams.set("name", e.name);
    url.searchParams.set("mode", mode);

    window.location.href = url.toString();
  });

  const tr = document.createElement("tr");

  const tdImg = document.createElement("td");
  tdImg.appendChild(img);

  const tdName = document.createElement("td");
  tdName.textContent = e.name;

  const tdCount = document.createElement("td");
  tdCount.textContent = e.count;

  const tdFirst = document.createElement("td");
  tdFirst.textContent = e.first;

  tr.appendChild(tdImg);
  tr.appendChild(tdName);
  tr.appendChild(tdCount);
  tr.appendChild(tdFirst);

  tbody.appendChild(tr);
});
}

function toggleSort() {
  desc = !desc;
  load();
}

function goDetail(name) {
  const mode = document.getElementById("mode").value;

  const url = new URL("detail.html", location.href);
  url.searchParams.set("name", name);
  url.searchParams.set("mode", mode);

  location.href = url.toString();
}

  function changeSort() {
  sortMode = document.getElementById("sort").value;

  // ▼ 回数以外は昇降非表示
  const order = document.getElementById("order");
  order.style.display = (sortMode === "count") ? "inline-block" : "none";

  load();
}

function changeOrder() {
  const val = document.getElementById("order").value;
  desc = (val === "desc");
  load();
}

  function setAsc() {
  desc = false;
  load();
}

function setDesc() {
  desc = true;
  load();
}

init();
</script>

</body>
</html>
