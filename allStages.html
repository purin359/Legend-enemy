<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全ステージ一覧</title>

<style>
body {
  font-family: sans-serif;
  max-width: 1400px;
  margin: auto;
  padding: 20px;
}

.stageTable {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 15px;
}

.stageTable th, .stageTable td {
  border: 1px solid #ccc;
  padding: 8px;
}

.stageTable th {
  width: 120px;
  background: #f0f0f0;
}

  h3 {
  margin: 0 0 10px 0;
  padding: 5px;
  background: #eee;
}

.stageRow {
  margin-bottom: 10px;
}

img {
  width: 45px;
  margin-right: 5px;
}
</style>
</head>
<body>

<h2>全ステージ一覧</h2>

<select id="mode" onchange="load()">
  <option value="ALL">全て</option>
  <option value="N">レジェンド</option>
  <option value="NA">真レジェンド</option>
  <option value="ND">レジェンド0</option>
</select>

<div id="list"></div>

<script>
let initialized = false;
  
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

async function load() {

  // ▼ 最初の1回だけURL反映
  if (!initialized) {
    const params = new URLSearchParams(location.search);
    const modeParam = params.get("mode");
    if (modeParam) {
      document.getElementById("mode").value = modeParam;
    }
    initialized = true;
  }

  const mode = document.getElementById("mode").value;
  const stagesData = await fetch("stages.json").then(r=>r.json());

  const list = document.getElementById("list");
  list.innerHTML = "";

  stagesData.forEach(ch => {

    const isTarget =
      (mode === "ALL") ||

      (mode === "N" && (
        (ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND"))
        || ch.chapterId === "E026"
      )) ||

      (mode === "NA" && (
        ch.chapterId.startsWith("NA")
        || ch.chapterId === "E068"
        || ch.chapterId === "E069"
      )) ||

      (mode === "ND" && ch.chapterId.startsWith("ND"));

    if (!isTarget) return;

    const chapterBox = document.createElement("div");
chapterBox.style.border = "2px solid #ccc";
chapterBox.style.padding = "10px";
chapterBox.style.marginBottom = "20px";

// ▼ 章タイトル
const title = document.createElement("h3");
title.textContent = ch.chapterName;
chapterBox.appendChild(title);

// ▼ ステージまとめ
ch.stages.forEach(st => {

  const row = document.createElement("div");
  row.style.marginBottom = "8px";

  // ステージ名
  const stageName = document.createElement("div");
  stageName.textContent = st.stageName;

  // 敵
  const enemyBox = document.createElement("div");

  st.enemies.forEach(enemyName => {

    if (enemyName === "カンバン娘") return;

    const baseName = enemyName.replace(/\r?\n/g, "").trim();

    const fileName = baseName
      .replace(/[：:]/g, " ")
      .replace(/[ 　]+/g, "");

    const img = document.createElement("img");
    img.src = "image/" + encodeURIComponent(fileName) + ".png";
    img.onerror = () => img.src = "image/noimage.png";

    // クリックで詳細
    img.addEventListener("click", () => {
      const url = new URL("detail.html", location.href);
      url.searchParams.set("name", enemyName);
      url.searchParams.set("mode", mode);
      location.href = url;
    });

    enemyBox.appendChild(img);
  });

  row.appendChild(stageName);
  row.appendChild(enemyBox);

  chapterBox.appendChild(row);
});

list.appendChild(chapterBox);
    
  });
}

load();
</script>

</body>
</html>
