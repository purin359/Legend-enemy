<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵出現一覧</title>

<style>
body { font-family: sans-serif; padding:20px; }

table { border-collapse: collapse; width:100%; }
th, td { border:1px solid #ccc; padding:5px; }
img { width:50px; cursor:pointer; }

th { cursor:pointer; }

.filterRow {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.attrSelect {
  position: relative;
}

.attrSelectBtn {
  min-height: 38px;
  min-width: 180px;
  padding: 6px 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: white;
  cursor: pointer;
  display: flex;
  align-items: center;
}

#attrSelectedView {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}

#attrSelectedView img {
  width: 24px;
  height: 24px;
}

.attrMenu {
  display: none;
  position: absolute;
  top: 42px;
  left: 0;
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 6px;
  z-index: 20;
  min-width: 220px;
  max-height: 240px;
  overflow-y: auto;
}

.attrMenu.open {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.attrOption {
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 6px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f8f8f8;
  cursor: pointer;
}

.attrOption img {
  width: 28px;
  height: 28px;
}

.attrOption.active {
  border-color: #4CAF50;
  background: #eaf7ea;
}

  .bgImg {
  width: 160px;
  height: 90px;
  object-fit: cover;
}

  tbody td:first-child {
    text-align: center;
    vertical-align: middle;
  }
  
</style>
</head>
<body>

<h2>敵出現一覧</h2>

<div class="filterRow">
  <input id="searchBox" placeholder="敵名で絞り込み" oninput="load()">

  <div class="attrSelect" id="attrSelect">
    <button type="button" id="attrSelectBtn" class="attrSelectBtn" onclick="toggleAttrMenu()">
      <span id="attrSelectedView">属性で絞り込み</span>
    </button>
    <div id="attrMenu" class="attrMenu">
  <div class="attrOption" onclick="toggleAttr('赤')">
    <img src="image_type/赤.png" alt="赤">
  </div>
  <div class="attrOption" onclick="toggleAttr('浮き')">
    <img src="image_type/浮き.png" alt="浮き">
  </div>
  <div class="attrOption" onclick="toggleAttr('黒')">
    <img src="image_type/黒.png" alt="黒">
  </div>
  <div class="attrOption" onclick="toggleAttr('メタル')">
    <img src="image_type/メタル.png" alt="メタル">
  </div>
  <div class="attrOption" onclick="toggleAttr('天使')">
    <img src="image_type/天使.png" alt="天使">
  </div>
  <div class="attrOption" onclick="toggleAttr('エイリアン')">
    <img src="image_type/エイリアン.png" alt="エイリアン">
  </div>
  <div class="attrOption" onclick="toggleAttr('ゾンビ')">
    <img src="image_type/ゾンビ.png" alt="ゾンビ">
  </div>
  <div class="attrOption" onclick="toggleAttr('悪魔')">
    <img src="image_type/悪魔.png" alt="悪魔">
  </div>
  <div class="attrOption" onclick="toggleAttr('古代種')">
    <img src="image_type/古代種.png" alt="古代種">
  </div>
  <div class="attrOption" onclick="toggleAttr('無属性')">
    <img src="image_type/無属性.png" alt="無属性">
  </div>
  <div class="attrOption" onclick="toggleAttr('超生命体')">
    <img src="image_type/超生命体.png" alt="超生命体">
  </div>
  <div class="attrOption" onclick="toggleAttr('超獣')">
    <img src="image_type/超獣.png" alt="超獣">
  </div>
  <div class="attrOption" onclick="toggleAttr('超賢者')">
    <img src="image_type/超賢者.png" alt="超賢者">
  </div>
  <div class="attrOption" onclick="toggleAttr('城')">
    <span>城</span>
  </div>
</div>
          
  </div>
</div>
  
<select id="mode" onchange="load()">
  <option value="ALL">全て</option>
  <option value="N">レジェンド</option>
  <option value="NA">真レジェンド</option>
  <option value="ND" selected>レジェンド0</option>
</select>

<select id="listType" onchange="changeListType(this.value)">
  <option value="enemy">敵</option>
  <option value="castle">城</option>
  <option value="background">背景</option>
</select>

<select id="sort" onchange="changeSort()">
  <option value="count">登場回数順</option>
  <option value="first">初出ステージ順</option>
  <option value="order">図鑑順</option>
</select>

<button id="orderBtn" onclick="toggleOrder()">降順</button>
  
  <button onclick="goAllStages()">全ステージ一覧へ</button>

  <button onclick="location.href='tools.html'">その他の機能</button>

<table>
<thead>
<tr>
  <th>画像</th>
  <th>敵名</th>
  <th>登場回数</th>
  <th>初出ステージ</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let stagesData = [];
let desc = true;
let enemiesData = {};
let sortMode = "count";
let orderMap = {};
let selectedAttrs = [];
let listType = "enemy";

async function init() {
  enemiesData = await fetch("enemies.json").then(r=>r.json());
  stagesData = await fetch("stages.json").then(r=>r.json());

  // 順番記録
  let i = 0;
  for (let key in enemiesData) {
    orderMap[enemiesData[key].name] = i++;
  }

  changeSort();
  
  load();
}
  
// 比較専用（スペース無視）
function normalize(str) {
  return str
    .toString()
    .replace(/\r?\n/g, "")
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
    )
    .replace(/[ァ-ン]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0x60)
    )
    .replace(/[：:]/g, "")
    .replace(/[ 　]+/g, "")
    .toLowerCase()
    .trim();
}

  function getEnemyTypes(enemyName) {
  const key = normalize(enemyName);

  const found = Object.values(enemiesData).find(enemy =>
    normalize(enemy.name) === key
  );

  if (!found || !found.type) return [];

  return String(found.type)
    .split(",")
    .map(s => s.trim())
    .filter(Boolean);
}
  
function load() {
  const type = document.getElementById("listType").value;
  listType = type;

  document.getElementById("searchBox").style.display =
    type === "enemy" ? "" : "none";

  document.getElementById("attrSelect").style.display =
    type === "enemy" ? "" : "none";

  updateSortOptions(type);

  if (type === "castle") {
    loadCastleList();
    return;
  }

  if (type === "background") {
    loadBackgroundList();
    return;
  }

  document.querySelector("thead tr").innerHTML = `
    <th>画像</th>
    <th>敵名</th>
    <th>登場回数</th>
    <th>初出ステージ</th>
  `;

  const mode = document.getElementById("mode").value;
  const map = {};

  stagesData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach(st => {
      st.enemies.forEach(enemyName => {
        const key = normalize(enemyName);

        if (!map[key]) {
          map[key] = {
            name: enemyName,
            count: 0,
            first: `${ch.chapterId}-${st.stageId} ${ch.chapterName}-${st.stageName}`
          };
        }

        map[key].count++;
      });
    });
  });

  let list = Object.values(map);

  const search = document.getElementById("searchBox").value.trim();

  if (search) {
    const keyword = normalize(search);
    list = list.filter(e => normalize(e.name).includes(keyword));
  }

  if (selectedAttrs.length > 0) {
    list = list.filter(e => {
      const types = getEnemyTypes(e.name);
      return selectedAttrs.some(attr => types.includes(attr));
    });
  }

  list = list.map(e => {
    return { ...e, firstNum: getFirstNum(e.first) };
  });

  list.sort((a, b) => {
    if (sortMode === "count") {
      return desc ? b.count - a.count : a.count - b.count;
    }

    if (sortMode === "first") {
      return a.firstNum - b.firstNum;
    }

    if (sortMode === "order") {
      return (orderMap[a.name] ?? 99999) - (orderMap[b.name] ?? 99999);
    }

    return 0;
  });

  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  list.forEach(e => {
    const baseName = e.name.replace(/\r?\n/g, "").trim();

    const fileName = baseName
      .replace(/[：:]/g, " ")
      .replace(/[ 　]+/g, "");

    const img = document.createElement("img");
    img.src = "image/" + encodeURIComponent(fileName) + ".png";
    img.onerror = () => img.src = "image/noimage.png";

    img.addEventListener("click", () => {
      const mode = document.getElementById("mode").value;

      const url = new URL("detail.html", location.href);
      url.searchParams.set("name", e.name);
      url.searchParams.set("mode", mode);

      location.href = url.toString();
    });

    const tr = document.createElement("tr");

    const tdImg = document.createElement("td");
    tdImg.appendChild(img);

    const tdName = document.createElement("td");
    tdName.textContent = e.name;

    const tdCount = document.createElement("td");
    tdCount.textContent = e.count;

    const tdFirst = document.createElement("td");
    tdFirst.textContent = e.first;

    tr.appendChild(tdImg);
    tr.appendChild(tdName);
    tr.appendChild(tdCount);
    tr.appendChild(tdFirst);

    tbody.appendChild(tr);
  });
}

function toggleSort() {
  desc = !desc;
  load();
}

function goDetail(name) {
  const mode = document.getElementById("mode").value;

  const url = new URL("detail.html", location.href);
  url.searchParams.set("name", name);
  url.searchParams.set("mode", mode);

  location.href = url.toString();
}

 function changeSort() {
  sortMode = document.getElementById("sort").value;

  const btn = document.getElementById("orderBtn");

  btn.style.display =
    (sortMode === "count") ? "inline-block" : "none";

  load();
}

function changeOrder() {
  const val = document.getElementById("order").value;
  desc = (val === "desc");
  load();
}

  function setAsc() {
  desc = false;
  load();
}

function setDesc() {
  desc = true;
  load();
}

  function goAllStages() {
  const mode = document.getElementById("mode").value;

  const url = new URL("allStages.html", location.href);
  url.searchParams.set("mode", mode);

  location.href = url.toString();
}

  function toggleOrder() {
  desc = !desc;

  const btn = document.getElementById("orderBtn");
  btn.textContent = desc ? "降順" : "昇順";

  load();
}

const attrImageMap = {
  "赤": "image_type/赤.png",
  "浮き": "image_type/浮き.png",
  "黒": "image_type/黒.png",
  "メタル": "image_type/メタル.png",
  "天使": "image_type/天使.png",
  "エイリアン": "image_type/エイリアン.png",
  "ゾンビ": "image_type/ゾンビ.png",
  "悪魔": "image_type/悪魔.png",
  "古代種": "image_type/古代種.png",
  "無属性": "image_type/無属性.png",
  "超生命体": "image_type/超生命体.png",
  "超獣": "image_type/超獣.png",
  "超賢者": "image_type/超賢者.png"
};

function toggleAttrMenu() {
  document.getElementById("attrMenu").classList.toggle("open");
}

function toggleAttr(attr) {
  if (selectedAttrs.includes(attr)) {
    selectedAttrs = selectedAttrs.filter(a => a !== attr);
  } else {
    selectedAttrs.push(attr);
  }

  updateAttrSelectedView();
  updateAttrOptionState();
  load();
}

function updateAttrSelectedView() {
  const view = document.getElementById("attrSelectedView");

  if (selectedAttrs.length === 0) {
    view.textContent = "属性で絞り込み";
    return;
  }

  view.innerHTML = "";

  selectedAttrs.forEach(attr => {
    if (attrImageMap[attr]) {
      const img = document.createElement("img");
      img.src = attrImageMap[attr];
      img.alt = attr;
      view.appendChild(img);
    } else {
      const span = document.createElement("span");
      span.textContent = attr;
      view.appendChild(span);
    }
  });
}

function updateAttrOptionState() {
  document.querySelectorAll(".attrOption").forEach(option => {
    const text = option.textContent.trim();
    const img = option.querySelector("img");
    const attr = img ? img.alt : text;

    option.classList.toggle("active", selectedAttrs.includes(attr));
  });
}

window.addEventListener("click", e => {
  const select = document.getElementById("attrSelect");
  if (!select.contains(e.target)) {
    document.getElementById("attrMenu").classList.remove("open");
  }
});

  function changeListType(type) {
  listType = type;

  document.getElementById("listType").value = type;

  load();
}

  async function loadCastleList() {
  const mode = document.getElementById("mode").value;

  const stageDetailsData = await fetch("stageDetails.json").then(r => r.json());
  const castlesData = await fetch("castles.json").then(r => r.json());

  const castleMap = {};
  castlesData.forEach(c => {
    castleMap[String(c.castleId)] = c.image;
  });

  const map = {};

  stageDetailsData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach(st => {
      const id = String(st.castleId);

      if (!map[id]) {
        map[id] = {
          id,
          count: 0,
          image: castleMap[id] || "",
          first: `${ch.chapterId}-${st.stageId} ${ch.chapterName}-${st.stageName}`
        };
      }

      map[id].count++;
    });
  });

  renderSpecialList(Object.values(map), "castle");
}

  async function loadBackgroundList() {
  const mode = document.getElementById("mode").value;

  const stageDetailsData = await fetch("stageDetails.json").then(r => r.json());
  const backgroundsData = await fetch("backgrounds.json").then(r => r.json());

  const backgroundMap = {};
  backgroundsData.forEach(bg => {
    backgroundMap[String(bg.background)] = bg.image;
  });

  const map = {};

  stageDetailsData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach(st => {
      const id = String(st.background);

      if (!map[id]) {
        map[id] = {
          id,
          count: 0,
          image: backgroundMap[id] || "",
          first: `${ch.chapterId}-${st.stageId} ${ch.chapterName}-${st.stageName}`
        };
      }

      map[id].count++;
    });
  });

  renderSpecialList(Object.values(map), "background");
}

  function renderSpecialList(list, type) {
  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  document.querySelector("thead tr").innerHTML = `
    <th>画像</th>
    <th>使用回数</th>
    <th>初出ステージ</th>
  `;

  list = list.map(e => ({
    ...e,
    firstNum: getFirstNum(e.first)
  }));

  list.sort((a, b) => {
    if (sortMode === "count") {
      return desc ? b.count - a.count : a.count - b.count;
    }

    if (sortMode === "first") {
      return a.firstNum - b.firstNum;
    }

    return 0;
  });

  list.forEach(e => {
    const img = document.createElement("img");
    img.src = e.image;
    img.className = type === "background" ? "bgImg" : "";
    img.onerror = () => img.src = "image/noimage.png";

    img.addEventListener("click", () => {
      const mode = document.getElementById("mode").value;

      const url = new URL("detail.html", location.href);
      url.searchParams.set(type, e.id);
      url.searchParams.set("mode", mode);
      url.searchParams.set("detail", "1");

      location.href = url.toString();
    });

    const tr = document.createElement("tr");

    const tdImg = document.createElement("td");
    tdImg.appendChild(img);

    const tdCount = document.createElement("td");
    tdCount.textContent = e.count;

    const tdFirst = document.createElement("td");
    tdFirst.textContent = e.first;

    tr.appendChild(tdImg);
    tr.appendChild(tdCount);
    tr.appendChild(tdFirst);

    tbody.appendChild(tr);
  });
}
  
  function isTargetChapter(ch, mode) {
  return (
    mode === "ALL" ||

    (mode === "N" && (
      (ch.chapterId.startsWith("N") &&
       !ch.chapterId.startsWith("NA") &&
       !ch.chapterId.startsWith("ND")) ||
      ch.chapterId === "E026"
    )) ||

    (mode === "NA" && (
      ch.chapterId.startsWith("NA") ||
      ch.chapterId === "E068" ||
      ch.chapterId === "E069"
    )) ||

    (mode === "ND" && ch.chapterId.startsWith("ND"))
  );
}

  function getFirstNum(first) {
  const match = first.match(/([A-Z]+)(\d+)-(\d+)/);

  if (!match) return 999999;

  const prefix = match[1];
  const chap = parseInt(match[2]);
  const stage = parseInt(match[3]);

  const base =
    prefix === "N"  ? 0 :
    prefix === "NA" ? 100000 :
    prefix === "ND" ? 200000 :
    prefix === "E"  ? 300000 : 400000;

  return base + chap * 100 + stage;
}

function updateSortOptions(type) {
  const sortSelect = document.getElementById("sort");
  const current = sortSelect.value;

  if (type === "enemy") {
    sortSelect.innerHTML = `
      <option value="count">登場回数順</option>
      <option value="first">初出ステージ順</option>
      <option value="order">図鑑順</option>
    `;
  } else {
    sortSelect.innerHTML = `
      <option value="count">使用回数順</option>
      <option value="first">初出ステージ順</option>
    `;
  }

  if ([...sortSelect.options].some(o => o.value === current)) {
    sortSelect.value = current;
  } else {
    sortSelect.value = "count";
    sortMode = "count";
  }
}

init();
</script>

</body>
</html>
