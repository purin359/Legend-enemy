<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全ステージ一覧</title>

<style>
body {
  font-family: sans-serif;
  max-width: 1400px;
  margin: auto;
  padding: 20px;
}

.stageTable th, .stageTable td {
  border: 1px solid #ccc;
  padding: 8px;
}

.stageTable th {
  width: 120px;
  background: #f0f0f0;
}

  .stageTable {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 10px;
}

h3 {
  margin: 0 0 10px 0;
  padding: 5px;
  background: #eee;
}
  
.stageRow {
  margin-bottom: 10px;
}

img {
  width: 45px;
  margin-right: 5px;
}

  .filterRow {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.attrBtn {
  padding: 6px;
  border: 1px solid #ccc;
  background: #f8f8f8;
  border-radius: 6px;
  cursor: pointer;
}

.attrBtn.active {
  background: #dff0df;
  border-color: #4CAF50;
}

.attrBtn img {
  width: 28px;
  height: 28px;
  margin: 0;
}

</style>
</head>
<body>
<button onclick="goBack()">戻る</button>

<h2>全ステージ一覧</h2>

<select id="mode" onchange="load()">
  <option value="ALL">全て</option>
  <option value="N">レジェンド</option>
  <option value="NA">真レジェンド</option>
  <option value="ND">レジェンド0</option>
</select>

<label>
  <input type="checkbox" id="showKanban" onchange="load()">
  カンバン娘を表示
</label>

<label>
  <input type="checkbox" id="showFirstOnly" onchange="load()">
  初登場敵のみ表示
</label>

<div class="filterRow">
  <button class="attrBtn" onclick="toggleAttr('赤')"><img src="image_type/赤.png"></button>
  <button class="attrBtn" onclick="toggleAttr('浮き')"><img src="image_type/浮き.png"></button>
  <button class="attrBtn" onclick="toggleAttr('黒')"><img src="image_type/黒.png"></button>
  <button class="attrBtn" onclick="toggleAttr('メタル')"><img src="image_type/メタル.png"></button>
  <button class="attrBtn" onclick="toggleAttr('天使')"><img src="image_type/天使.png"></button>
  <button class="attrBtn" onclick="toggleAttr('エイリアン')"><img src="image_type/エイリアン.png"></button>
  <button class="attrBtn" onclick="toggleAttr('ゾンビ')"><img src="image_type/ゾンビ.png"></button>
  <button class="attrBtn" onclick="toggleAttr('悪魔')"><img src="image_type/悪魔.png"></button>
  <button class="attrBtn" onclick="toggleAttr('古代種')"><img src="image_type/古代種.png"></button>
  <button class="attrBtn" onclick="toggleAttr('無属性')"><img src="image_type/無属性.png"></button>
  <button class="attrBtn" onclick="toggleAttr('超生命体')"><img src="image_type/超生命体.png"></button>
  <button class="attrBtn" onclick="toggleAttr('超獣')"><img src="image_type/超獣.png"></button>
  <button class="attrBtn" onclick="toggleAttr('超賢者')"><img src="image_type/超賢者.png"></button>
  <button class="attrBtn" onclick="toggleAttr('城')">城</button>
</div>

<div id="list"></div>

<script>
let initialized = false;
let selectedAttrs = [];
  
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

  let enemiesData = {};

async function init() {
  enemiesData = await fetch("enemies.json").then(r=>r.json());
  load();
}

init();

async function load() {

  if (!initialized) {
    const params = new URLSearchParams(location.search);
    const modeParam = params.get("mode");
    if (modeParam) {
      document.getElementById("mode").value = modeParam;
    }
    initialized = true;
  }

  const mode = document.getElementById("mode").value;
  const stagesData = await fetch("stages.json").then(r => r.json());

  const list = document.getElementById("list");
  list.innerHTML = "";

  const shownInRange = new Set();

  stagesData.forEach(ch => {

    const isTarget =
      (mode === "ALL") ||

      (mode === "N" && (
        (ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND"))
        || ch.chapterId === "E026"
      )) ||

      (mode === "NA" && (
        ch.chapterId.startsWith("NA")
        || ch.chapterId === "E068"
        || ch.chapterId === "E069"
      )) ||

      (mode === "ND" && ch.chapterId.startsWith("ND"));

    if (!isTarget) return;

    const chapterBox = document.createElement("div");
    chapterBox.style.border = "2px solid #ccc";
    chapterBox.style.padding = "10px";
    chapterBox.style.marginBottom = "20px";

    let hasAnyEnemyInChapter = false;

    const title = document.createElement("h3");
    title.textContent = ch.chapterName;
    chapterBox.appendChild(title);

    ch.stages.forEach(st => {
      const table = document.createElement("table");
      table.className = "stageTable";

      const tr1 = document.createElement("tr");
      tr1.innerHTML = `
        <th>ステージ</th>
        <td>${st.stageName}</td>
      `;

      const tr2 = document.createElement("tr");
      const th = document.createElement("th");

      const showKanban = document.getElementById("showKanban").checked;
      const showFirstOnly = document.getElementById("showFirstOnly").checked;

      th.textContent = showFirstOnly ? "初登場の敵" : "出現する敵";

      const td = document.createElement("td");

      st.enemies.forEach(enemyName => {
        if (!showKanban && enemyName === "カンバン娘") return;

        const enemyKey = normalize(enemyName);

        if (showFirstOnly && shownInRange.has(enemyKey)) {
          return;
        }

        shownInRange.add(enemyKey);

        const baseName = enemyName.replace(/\r?\n/g, "").trim();

        const fileName = baseName
          .replace(/[：:]/g, " ")
          .replace(/[ 　]+/g, "");

        const img = document.createElement("img");
        img.src = "image/" + encodeURIComponent(fileName) + ".png";
        img.onerror = () => img.src = "image/noimage.png";

        img.addEventListener("click", () => {
          const url = new URL("detail.html", location.href);
          url.searchParams.set("name", enemyName);
          url.searchParams.set("mode", mode);
          location.href = url;
        });

        td.appendChild(img);
        hasAnyEnemyInChapter = true;
      });

      if (td.childElementCount === 0) {
        return;
      }

      tr2.appendChild(th);
      tr2.appendChild(td);

      table.appendChild(tr1);
      table.appendChild(tr2);

      chapterBox.appendChild(table);
    });

    if (selectedAttrs.length > 0 && !stageHasAllAttrs(st.enemies, selectedAttrs)) {
  return;
}

    const showFirstOnly = document.getElementById("showFirstOnly").checked;

    if (showFirstOnly && !hasAnyEnemyInChapter) {
      const noEnemy = document.createElement("div");
      noEnemy.textContent = "初登場敵なし";
      noEnemy.style.padding = "10px";
      noEnemy.style.color = "#666";
      noEnemy.style.background = "#f8f8f8";
      noEnemy.style.border = "1px dashed #ccc";
      noEnemy.style.textAlign = "center";
      chapterBox.appendChild(noEnemy);
    }

    list.appendChild(chapterBox);
  });
}
  
  function goBack() {
  history.back();
}

  function stageHasAllAttrs(enemies, selectedAttrs) {
  // ステージ内の全属性を集める
  const allTypes = new Set();

  enemies.forEach(name => {
    const types = getEnemyTypes(name);
    types.forEach(t => allTypes.add(t));
  });

  // AND条件
  return selectedAttrs.every(attr => allTypes.has(attr));
}

  function getEnemyTypes(enemyName) {
  const key = normalize(enemyName);

  const found = Object.values(enemiesData).find(enemy =>
    normalize(enemy.name) === key
  );

  if (!found || !found.type) return [];

  return String(found.type)
    .split(",")
    .map(s => s.trim())
    .filter(Boolean);
}

  function toggleAttr(attr) {
  if (selectedAttrs.includes(attr)) {
    selectedAttrs = selectedAttrs.filter(a => a !== attr);
  } else {
    selectedAttrs.push(attr);
  }

  updateAttrButtons();
  load();
}

function updateAttrButtons() {
  document.querySelectorAll(".attrBtn").forEach(btn => {
    const img = btn.querySelector("img");
    if (!img) return;

    const attr = img.getAttribute("src")
      .replace("image_type/", "")
      .replace(".png", "");

    btn.classList.toggle("active", selectedAttrs.includes(attr));
  });
}
</script>

</body>
</html>
