<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>その他の機能</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: sans-serif;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.menu {
  display: flex;          /* 横並び */
  gap: 10px;
  margin-top: 20px;
}

.funcBtn {
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: #f5f5f5;
  cursor: pointer;
  transition: 0.2s;
}

/* ホバー */
.funcBtn:hover {
  background: #e0e0e0;
}

/* 選択中（超重要） */
.funcBtn.active {
  background: #4CAF50;
  color: white;
  border-color: #4CAF50;
  font-weight: bold;
}

.funcArea {
  display: none;
  margin-top: 20px;
}

.searchWrap {
  position: relative;
  margin-top: 10px;
}

#suggest {
  border: 1px solid #ccc;
  max-height: 150px;
  overflow-y: auto;
  background: white;
  position: absolute;
  width: 250px;
  z-index: 10;
}

.suggestItem {
  padding: 6px;
  cursor: pointer;
}

.suggestItem:hover {
  background: #eee;
}

  .suggestItem.active {
  background: #cfe8ff;
}

canvas {
  margin-top: 20px;
}

  .detailTable {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

.detailTable th,
.detailTable td {
  border: 1px solid #ccc;
  padding: 8px;
  vertical-align: middle;
}

.detailTable th {
  background: #f0f0f0;
  text-align: center;
}

.detailTable td {
  text-align: center;
}

.detailTable td.chapterCell,
.detailTable td.stageCell {
  text-align: left;
}

.detailTable td.numCell {
  text-align: center;
}

  .detailTable thead th {
  position: sticky;
  top: 0;
  z-index: 5;
  background: #f0f0f0;
}

  #bossTableBody td:first-child {
  text-align: center;
}
</style>
</head>

<body>

<button onclick="history.back()">戻る</button>

<h2>その他</h2>

<div class="menu">
  <button class="funcBtn" onclick="openFunc('detailSort', this)">詳細並び替え</button>
  <button class="funcBtn active" onclick="openFunc('graph', this)">登場ステージグラフ</button>
  <button class="funcBtn" onclick="openFunc('bossList', this)">ボス一覧</button>
</div>
  
<!-- グラフ機能 -->
<div id="graph" class="funcArea">

  <h3>敵の登場ステージグラフ</h3>

  <select id="mode" onchange="drawGraph()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

  <div class="searchWrap">
  <input id="enemyInput" placeholder="敵名を入力">
  <button type="button" onclick="clearEnemyInput()">×</button>
  <div id="suggest"></div>
</div>

  <div id="info"></div>

  <canvas id="chart"></canvas>
<label id="showStageEnemiesLabel" style="display:none;">
  <input type="checkbox" id="showStageEnemies" onchange="redrawStageList()">
  構成あり
</label>
<div id="stageList"></div>
</div>

  <!-- 詳細並び替え機能 -->
<div id="detailSort" class="funcArea">

  <h3>ステージ詳細並び替え</h3>

  <select id="detailMode" onchange="drawDetailTable()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

  <select id="detailSortKey" onchange="drawDetailTable()">
    <option value="castleHP">城体力</option>
    <option value="bossPosition">ボス位置</option>
    <option value="castleDistance">城距離</option>
    <option value="energy">統率力</option>
    <option value="unitLimit">出撃制限</option>
  </select>

  <button id="detailOrderBtn" onclick="toggleDetailOrder()">降順</button>

  <table class="detailTable">
    <thead>
      <tr>
        <th>章名</th>
        <th>ステージ名</th>
        <th>城体力</th>
        <th>ボス位置</th>
        <th>城距離</th>
        <th>統率力</th>
        <th>出撃制限</th>
      </tr>
    </thead>
    <tbody id="detailTableBody"></tbody>
  </table>

</div>

  <div id="bossList" class="funcArea">
  <h3>ボス一覧</h3>

  <select id="bossMode" onchange="drawBossTable()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

  <select id="bossRateType" onchange="drawBossTable()">
    <option value="fraction">分数</option>
    <option value="decimal">%表示</option>
  </select>

  <select id="bossSort" onchange="drawBossTable()">
    <option value="count">ボス回数順</option>
    <option value="rate">ボス率順</option>
    <option value="first">初ボス順</option>
  </select>

  <table class="detailTable">
    <thead>
      <tr>
        <th>画像</th>
        <th>敵名</th>
        <th>ボス回数</th>
        <th>ボス率</th>
        <th>初ボスステージ</th>
      </tr>
    </thead>
    <tbody id="bossTableBody"></tbody>
  </table>
</div>

<script>
let stagesData = [];
let enemiesData = [];
let enemyNames = [];
let selectedEnemy = "";
let chart;
let graphStageMap = {};
let maxStage = 0;
let lastSelectedPos = null;
let suggestIndex = -1;
let currentSuggestList = [];
let stageDetailsData = [];
let detailDesc = true;
let castlesData = [];
let castleMap = {};

function normalize(str) {
  return String(str)
    .replace(/\r?\n/g, "")
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
    )
    .replace(/[ァ-ン]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0x60)
    )
    .replace(/[：:]/g, "")
    .replace(/[ 　]+/g, "")
    .toLowerCase()
    .trim();
}

function openFunc(id, btn) {
  document.querySelectorAll(".funcArea").forEach(el => {
    el.style.display = "none";
  });

  document.getElementById(id).style.display = "block";

  document.querySelectorAll(".funcBtn").forEach(b => {
    b.classList.remove("active");
  });

  btn.classList.add("active");

  if (id === "detailSort") {
    drawDetailTable();
  }

  if (id === "bossList") {
    drawBossTable();
  }
}

async function init() {
  stagesData = await fetch("stages.json").then(r => r.json());
  enemiesData = await fetch("enemies.json").then(r => r.json());

  stageDetailsData = await fetch("stageDetails.json")
    .then(r => r.ok ? r.json() : [])
    .catch(() => []);

  castlesData = await fetch("castles.json")
    .then(r => r.ok ? r.json() : [])
    .catch(() => []);

  castleMap = {};
  castlesData.forEach(c => {
    castleMap[String(c.castleId)] = {
      image: c.image,
      bossPosition: c.bossPosition !== undefined ? Number(c.bossPosition) : ""
    };
  });

  enemyNames = Object.values(enemiesData).map(e => e.name);

  setupSuggest();

  openFunc("detailSort", document.querySelectorAll(".funcBtn")[0]);
}
  
function setupSuggest() {
  const input = document.getElementById("enemyInput");
  const suggest = document.getElementById("suggest");

  input.addEventListener("input", () => {
    const key = normalize(input.value);
    suggest.innerHTML = "";
    suggestIndex = -1;
    currentSuggestList = [];

    if (!key) return;

    currentSuggestList = enemyNames
      .filter(n => normalize(n).includes(key))
      .slice(0, 20);

    currentSuggestList.forEach((name, i) => {
      const div = document.createElement("div");
      div.className = "suggestItem";
      div.textContent = name;
      div.onclick = () => selectSuggest(name);
      suggest.appendChild(div);
    });
  });

  input.addEventListener("keydown", e => {
    if (e.isComposing || e.keyCode === 229) return;
    if (currentSuggestList.length === 0) return;

    if (e.key === "ArrowDown") {
      e.preventDefault();
      suggestIndex = (suggestIndex + 1) % currentSuggestList.length;
      updateSuggestSelection();
    }

    if (e.key === "ArrowUp") {
      e.preventDefault();
      suggestIndex = (suggestIndex - 1 + currentSuggestList.length) % currentSuggestList.length;
      updateSuggestSelection();
    }

    if (e.key === "Enter") {
      e.preventDefault();
      if (suggestIndex < 0) suggestIndex = 0;
      selectSuggest(currentSuggestList[suggestIndex]);
    }
  });
}

function selectSuggest(name) {
  selectedEnemy = name;
  document.getElementById("enemyInput").value = name;
  document.getElementById("suggest").innerHTML = "";
  suggestIndex = -1;
  currentSuggestList = [];
  drawGraph();
}

function updateSuggestSelection() {
  document.querySelectorAll(".suggestItem").forEach((item, i) => {
    item.classList.toggle("active", i === suggestIndex);
    if (i === suggestIndex) item.scrollIntoView({ block: "nearest" });
  });
}

function drawGraph() {
  if (!selectedEnemy) return;

  const mode = document.getElementById("mode").value;
  const key = normalize(selectedEnemy);

  const counts = {};
  graphStageMap = {};
  let total = 0;
  let maxStage = 0;

  stagesData.forEach(ch => {
    const ok =
      mode === "ALL" ||
      (mode === "N" && ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND")) ||
      (mode === "NA" && ch.chapterId.startsWith("NA")) ||
      (mode === "ND" && ch.chapterId.startsWith("ND"));

    if (!ok) return;

    ch.stages.forEach((st, i) => {
      const pos = i + 1;
      if (pos > maxStage) maxStage = pos;

      if (st.enemies.some(e => normalize(e) === key)) {
        counts[pos] = (counts[pos] || 0) + 1;
        total++;

        if (!graphStageMap[pos]) graphStageMap[pos] = [];

        graphStageMap[pos].push({
          chapterName: ch.chapterName,
          chapterId: ch.chapterId,
          stageId: st.stageId,
          stageName: st.stageName,
          enemies: st.enemies
        });
      }
    });
  });

  let lastNonZero = 0;

for (let i = 1; i <= maxStage; i++) {
  if ((counts[i] || 0) > 0) lastNonZero = i;
}

const displayMax = Math.max(6, lastNonZero);

const labels = [];
const data = [];

for (let i = 1; i <= displayMax; i++) {
  labels.push(i);
  data.push(counts[i] || 0);
}

  document.getElementById("info").textContent =
    `${selectedEnemy} 出現数: ${total}`;

  document.getElementById("stageList").innerHTML = "";

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: labels.map(n => `${n}ステージ目`),
      datasets: [{ label: "回数", data }]
    },
    options: {
  scales: {
    y: {
      beginAtZero: true,
      ticks: {
        stepSize: 1,
        precision: 0,
        maxTicksLimit: 5
      },
      grid: {
        drawTicks: true
      }
    }
  },
  onClick: (event, elements) => {
    if (elements.length === 0) return;

    const index = elements[0].index;
    const pos = labels[index];

    showStageList(pos);
  }
}
  });
  document.getElementById("stageList").innerHTML = "";
document.getElementById("showStageEnemiesLabel").style.display = "none";
lastSelectedPos = null;
}

function showStageList(pos) {
  document.getElementById("showStageEnemiesLabel").style.display = "block";
  lastSelectedPos = pos;

  const area = document.getElementById("stageList");
  const stages = graphStageMap[pos] || [];

  if (stages.length === 0) {
    area.innerHTML = `<h3>${pos}ステージ目の一覧</h3><p>該当なし</p>`;
    return;
  }

  const enemyName = selectedEnemy;
  const fileName = enemyName
    .replace(/\r?\n/g, "")
    .trim()
    .replace(/[：:]/g, " ")
    .replace(/[ 　]+/g, "");

  const imgPath = "image/" + encodeURIComponent(fileName) + ".png";
  const showEnemies = document.getElementById("showStageEnemies").checked;

  area.innerHTML = `
    <h3>${pos}ステージ目の一覧</h3>

    <div style="margin-bottom:10px;">
      <img src="${imgPath}" style="width:40px;" onerror="this.src='image/noimage.png'">
      ${enemyName}
    </div>

    <ul style="${showEnemies ? 'padding-left:0;' : ''}">
      ${stages.map(st => `
        <li style="
          margin-bottom:10px;
          ${showEnemies ? 'border:1px solid #ccc; border-radius:8px; padding:8px; list-style:none;' : ''}
        ">
          <div>
            ${st.chapterId}-${st.stageId}
            ${st.chapterName} - ${st.stageName}
          </div>

          ${showEnemies ? `
            <div style="margin-top:6px;">
              ${st.enemies
                .filter(e => e !== "カンバン娘")
                .map(enemy => `
                  <img src="${getEnemyImagePath(enemy)}"
                       title="${enemy}"
                       style="width:36px; margin-right:4px;"
                       onerror="this.src='image/noimage.png'">
                `).join("")}
            </div>
          ` : ""}
        </li>
      `).join("")}
    </ul>
  `;
}
  
  function getEnemyImagePath(enemyName) {
  const fileName = enemyName
    .replace(/\r?\n/g, "")
    .trim()
    .replace(/[：:]/g, " ")
    .replace(/[ 　]+/g, "");

  return "image/" + encodeURIComponent(fileName) + ".png";
}

function redrawStageList() {
  if (lastSelectedPos !== null) {
    showStageList(lastSelectedPos);
  }
}

  function clearEnemyInput() {
  document.getElementById("enemyInput").value = "";
  document.getElementById("suggest").innerHTML = "";
  document.getElementById("info").textContent = "";
  document.getElementById("stageList").innerHTML = "";
  document.getElementById("showStageEnemiesLabel").style.display = "none";

  selectedEnemy = "";
  suggestIndex = -1;
  currentSuggestList = [];
  lastSelectedPos = null;

  if (chart) {
    chart.destroy();
    chart = null;
  }
}

  // 詳細一覧
  function isTargetChapter(ch, mode) {
  return (
    mode === "ALL" ||

    (mode === "N" && (
      (ch.chapterId.startsWith("N") &&
       !ch.chapterId.startsWith("NA") &&
       !ch.chapterId.startsWith("ND")) ||
      ch.chapterId === "E026"
    )) ||

    (mode === "NA" && (
      ch.chapterId.startsWith("NA") ||
      ch.chapterId === "E068" ||
      ch.chapterId === "E069"
    )) ||

    (mode === "ND" && ch.chapterId.startsWith("ND"))
  );
}

  function drawDetailTable() {
  const mode = document.getElementById("detailMode").value;
  const sortKey = document.getElementById("detailSortKey").value;
  const tbody = document.getElementById("detailTableBody");

  tbody.innerHTML = "";

  let rows = [];

  stageDetailsData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach(st => {
      const bossCastleId = st.bossCastleId ?? st.castleId;
      const bossPosition = castleMap[String(bossCastleId)]?.bossPosition ?? "";
      rows.push({
        chapterId: ch.chapterId,
        chapterName: ch.chapterName,
        stageId: st.stageId,
        stageName: st.stageName,
        castleHP: Number(st.castleHP) || 0,
        bossPosition: bossPosition,
        castleDistance: Number(st.castleDistance) || 0,
        energy: Number(st.energy) || 0,
        unitLimit: Number(st.unitLimit) || 0
      });
    });
  });

  rows.sort((a, b) => {
    return detailDesc
      ? b[sortKey] - a[sortKey]
      : a[sortKey] - b[sortKey];
  });

  rows.forEach(row => {
  const tr = document.createElement("tr");

  tr.innerHTML = `
  <td class="chapterCell">${row.chapterName}</td>
  <td class="stageCell">${row.stageName}</td>
  <td class="numCell">${row.castleHP.toLocaleString()}</td>
  <td class="numCell">${row.bossPosition}</td>
  <td class="numCell">${row.castleDistance}</td>
  <td class="numCell">${row.energy}</td>
  <td class="numCell">${row.unitLimit}</td>
`;
    
  tbody.appendChild(tr);
});

    let prevChapter = null;
let rowspanStart = null;
let rowspanCount = 0;

const trs = tbody.querySelectorAll("tr");

trs.forEach((tr, i) => {
  const chapterCell = tr.children[0];
  const chapter = chapterCell.textContent;

  if (chapter === prevChapter) {
    rowspanCount++;
    chapterCell.remove();
  } else {
    if (rowspanStart !== null && rowspanCount > 1) {
      trs[rowspanStart].children[0].rowSpan = rowspanCount;
    }

    prevChapter = chapter;
    rowspanStart = i;
    rowspanCount = 1;
  }

  // 最後の処理
  if (i === trs.length - 1 && rowspanCount > 1) {
    trs[rowspanStart].children[0].rowSpan = rowspanCount;
  }
});
  }

function toggleDetailOrder() {
  detailDesc = !detailDesc;

  document.getElementById("detailOrderBtn").textContent =
    detailDesc ? "降順" : "昇順";

  drawDetailTable();
}

  // ボスリスト
  function drawBossTable() {
  const mode = document.getElementById("bossMode").value;
  const rateType = document.getElementById("bossRateType").value;
  const tbody = document.getElementById("bossTableBody");

  tbody.innerHTML = "";

  const appearMap = {};
  const bossMap = {};

  stagesData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach(st => {
      st.enemies.forEach(enemyName => {
        const key = normalize(enemyName);

        if (!appearMap[key]) {
          appearMap[key] = {
            name: enemyName,
            count: 0
          };
        }

        appearMap[key].count++;
      });
    });
  });

  stageDetailsData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach(st => {
      if (!st.bosses || st.bosses === "なし") return;

      const bosses = String(st.bosses)
        .split(/[,\、]/)
        .map(s => s.trim())
        .filter(Boolean);

      bosses.forEach(bossName => {
        const key = normalize(bossName);

        if (!bossMap[key]) {
          bossMap[key] = {
            name: bossName,
            bossCount: 0,
            firstBoss: `${ch.chapterId}-${st.stageId} ${ch.chapterName}-${st.stageName}`
          };
        }

        bossMap[key].bossCount++;
      });
    });
  });

  let list = Object.values(bossMap).map(b => {
    const appearCount = appearMap[normalize(b.name)]?.count || 0;

    return {
      ...b,
      appearCount,
      rate: appearCount ? b.bossCount / appearCount : 0,
      firstNum: getFirstNum(b.firstBoss)
    };
  });

  const sortType = document.getElementById("bossSort").value;

list.sort((a, b) => {
  if (sortType === "count") {
    return b.bossCount - a.bossCount || a.firstNum - b.firstNum;
  }

  if (sortType === "rate") {
    return b.rate - a.rate || b.bossCount - a.bossCount;
  }

  if (sortType === "first") {
    return a.firstNum - b.firstNum;
  }

  return 0;
});
    
  list.forEach(e => {
    const tr = document.createElement("tr");

    const img = document.createElement("img");

    img.src = getEnemyImagePath(e.name);

img.style.cursor = "pointer";

img.addEventListener("click", () => {
  const mode = document.getElementById("bossMode").value;

  const url = new URL("detail.html", location.href);
  url.searchParams.set("name", e.name);
  url.searchParams.set("mode", mode);
  url.searchParams.set("boss", "1");

  // ★追加
  url.searchParams.set("bossCount", e.bossCount);
  url.searchParams.set("appearCount", e.appearCount);

  location.href = url.toString();
});
    
    img.onerror = () => img.src = "image/noimage.png";

    const rateText =
  rateType === "fraction"
    ? `${e.bossCount}/${e.appearCount}`
    : `${(e.rate * 100).toFixed(1).replace(/\.0$/, "")}%`;
    
    tr.innerHTML = `
      <td></td>
      <td class="stageCell">${e.name}</td>
      <td class="numCell">${e.bossCount}</td>
      <td class="numCell">${rateText}</td>
      <td class="stageCell">${e.firstBoss}</td>
    `;

    tr.children[0].appendChild(img);
    tbody.appendChild(tr);
  });
}

  function getFirstNum(first) {
  const match = first.match(/([A-Z]+)(\d+)-(\d+)/);

  if (!match) return 999999;

  const prefix = match[1];
  const chap = parseInt(match[2]);
  const stage = parseInt(match[3]);

  const base =
    prefix === "N"  ? 0 :
    prefix === "NA" ? 100000 :
    prefix === "ND" ? 200000 :
    prefix === "E"  ? 300000 : 400000;

  return base + chap * 100 + stage;
}
  
init();
</script>

</body>
</html>
