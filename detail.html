<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵詳細</title>

<style>
body { font-family: sans-serif; padding:20px; }

ul { list-style:none; padding-left:0; }

.stageTable {
  width:100%;
  border-collapse: collapse;
  margin-bottom:15px;
}

.stageTable th, .stageTable td {
  border:1px solid #ccc;
  padding:8px;
}

.stageTable th {
  width:120px;
  background:#f0f0f0;
}

img {
  width:40px;
  margin-right:5px;
}

.highlight {
  border:2px solid red;
}
</style>
</head>
<body>

<h2 id="title"></h2>
<p id="count"></p>

<ul id="list"></ul>

<script>
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

async function load() {
  const params = new URLSearchParams(location.search);
  const name = params.get("name");
  const mode = params.get("mode");

  document.getElementById("title").textContent = name;

  const stagesData = await fetch("stages.json").then(r=>r.json());
  const ul = document.getElementById("list");

  let total = 0;

  stagesData.forEach(ch => {

    const isTarget =
  (mode === "ALL") ||

  (mode === "N" && (
    (ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND"))
    || ch.chapterId === "E026"
  )) ||

  (mode === "NA" && (
    ch.chapterId.startsWith("NA")
    || ch.chapterId === "E068"
    || ch.chapterId === "E069"
  )) ||

  (mode === "ND" && ch.chapterId.startsWith("ND"));
    
    if (!isTarget) return;

    ch.stages.forEach(st => {

      if (st.enemies.map(normalize).includes(normalize(name))) {

        total++;

        const li = document.createElement("li");

        const table = document.createElement("table");
table.className = "stageTable";

// ▼ ALLモードのときだけ色分け
if (mode === "ALL") {

  if (ch.chapterId.startsWith("NA") || ch.chapterId === "E068" || ch.chapterId === "E069") {
    table.style.backgroundColor = "#ccff99"; // 真レジェンド（黄緑）
  }

  else if (ch.chapterId.startsWith("ND")) {
    table.style.backgroundColor = "#5f86b3"; // レジェンド0（紺）
    table.style.color = "white";
  }
}

        // ステージ
        const tr1 = document.createElement("tr");
        tr1.innerHTML = `
          <th>ステージ</th>
          <td>${ch.chapterName}-${st.stageName}</td>
        `;

        // 敵
        const tr2 = document.createElement("tr");
        const th = document.createElement("th");
        th.textContent = "出現する敵";

        const td = document.createElement("td");

        st.enemies.forEach(enemyName => {

  // ▼ カンバン娘は画像表示しない
  if (normalize(enemyName) === normalize("カンバン娘")) return;

  const baseName = enemyName
    .replace(/\r?\n/g, "")
    .trim();

  const fileName = baseName
    .replace(/[：:]/g, "")
    .replace(/[ 　]+/g, "");

  const img = document.createElement("img");
  img.src = "image/" + encodeURIComponent(fileName) + ".png";
  img.onerror = () => img.src = "image/noimage.png";

  td.appendChild(img);
});
        
        tr2.appendChild(th);
        tr2.appendChild(td);

        table.appendChild(tr1);
        table.appendChild(tr2);

        li.appendChild(table);
        ul.appendChild(li);
      }

    });

  });

  document.getElementById("count").textContent =
    total === 0 ? "見つかりませんでした" : total + "件見つかりました";
}

load();
</script>

</body>
</html>
