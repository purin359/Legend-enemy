<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵詳細</title>

<style>
body { font-family: sans-serif; padding:20px; }

ul { list-style:none; padding-left:0; }

.stageTable {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 15px;
  table-layout: fixed;
}

.stageTable th,
.stageTable td {
  border: 1px solid #ccc;
  padding: 8px;
  box-sizing: border-box;
}

.stageTable th {
  width: 120px;
  background: #f0f0f0;
}

/* 左側：ステージ名・敵構成 */
.stageTable td:nth-child(2) {
  width: calc(100% - 420px);
}

/* 右側：敵城背景 */
.stageTable td:nth-child(3) {
  width: 300px;
}

img {
  width: 40px;
  margin-right: 5px;
}

.highlight {
  border: 2px solid red;
}

.detailGrid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.detailGrid > div {
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 8px;
  text-align: center;
  background: #fafafa;
}

.detailLabel {
  font-size: 13px;
  color: #555;
}

.detailValue {
  font-size: 16px;
  font-weight: bold;
}

.sideInfoTable {
  border-collapse: collapse;
  width: 100%;
  height: 100%;
  table-layout: fixed;
}

.sideInfoTable th,
.sideInfoTable td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
  vertical-align: middle;
  box-sizing: border-box;
}

.sideInfoTable th {
  background: #f0f0f0;
  width: 60px;
}

.castleImg {
  width: 60px;
  height: 80px;
  object-fit: contain;
}

.bgImg {
  width: 100px;
  height: 55px;
  object-fit: cover;
}

.sideLabel {
  white-space: nowrap;
  line-height: 1.4;
  width: 60px;
}

.sideImages {
  white-space: nowrap;
}

.sideImages img {
  margin-right: 14px;
  vertical-align: middle;
}

  .titleWithIcon {
  display: flex;
  align-items: center;
  gap: 8px;
}

.titleIcon {
  width: 45px;
  height: 45px;
  object-fit: contain;
}

  .titleIconCastle {
  width: 70px;
  height: auto;
  object-fit: contain;
}

.titleIconBg {
  width: 140px;
  height: auto;
  object-fit: contain;
}
  
</style>
</head>
<body>

<button onclick="goBack()">戻る</button>

<h2 class="titleWithIcon">
  <img id="titleIcon" class="titleIcon">
  <span id="title"></span>
</h2>
  
<p id="count"></p>
  <label>
  <input type="checkbox" id="showKanban" onchange="load()">
  カンバン娘を表示
</label>
<label>
  <input type="checkbox" id="showDetail" onchange="load()">
  詳細表示
</label>

<ul id="list"></ul>

<script>
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

async function load() {
  const params = new URLSearchParams(location.search);

  const name = params.get("name");
  const mode = params.get("mode") || "ALL";
  const castleParam = params.get("castle");
  const backgroundParam = params.get("background");
  const detailParam = params.get("detail");

  if (detailParam === "1") {
    document.getElementById("showDetail").checked = true;
  }

 const stagesData = await fetch("stages.json").then(r => r.json());

const stageDetailsData = await fetch("stageDetails.json")
  .then(r => r.ok ? r.json() : [])
  .catch(() => []);

const castlesData = await fetch("castles.json")
  .then(r => r.ok ? r.json() : [])
  .catch(() => []);

const backgroundsData = await fetch("backgrounds.json")
  .then(r => r.ok ? r.json() : [])
  .catch(() => []);
  
const detailMap = {};

const stageDetailList = Array.isArray(stageDetailsData)
  ? stageDetailsData
  : Object.values(stageDetailsData);

stageDetailList.forEach(ch => {
  ch.stages.forEach(st => {
    detailMap[`${ch.chapterId}-${st.stageId}`] = st;
  });
});
  
const castleMap = {};
const castleList = Array.isArray(castlesData)
  ? castlesData
  : Object.values(castlesData);

castleList.forEach(c => {
  castleMap[String(c.castleId)] = c.image;
});

const backgroundMap = {};
const backgroundList = Array.isArray(backgroundsData)
  ? backgroundsData
  : Object.values(backgroundsData);

backgroundList.forEach(bg => {
  backgroundMap[String(bg.background)] = bg.image;
});

  document.getElementById("title").textContent = name || "";

// 一旦リセット
titleIcon.classList.remove("titleIconLarge", "titleIconCastle", "titleIconBg");

if (name) {
  // 敵
  const titleFileName = name
    .replace(/\r?\n/g, "")
    .trim()
    .replace(/[：:]/g, " ")
    .replace(/[ 　]+/g, "");

  titleIcon.src = "image/" + encodeURIComponent(titleFileName) + ".png";
  titleIcon.onerror = () => titleIcon.src = "image/noimage.png";

} else if (castleParam) {
  // 城
  titleIcon.src = castleMap[String(castleParam)] || "";
  titleIcon.classList.add("titleIconCastle");

} else if (backgroundParam) {
  // 背景
  titleIcon.src = backgroundMap[String(backgroundParam)] || "";
  titleIcon.classList.add("titleIconBg");

} else {
  titleIcon.style.display = "none";
}
  
  const ul = document.getElementById("list");
  ul.innerHTML = "";

  let total = 0;

  stagesData.forEach(ch => {

    const isTarget =
  (mode === "ALL") ||

  (mode === "N" && (
    (ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND"))
    || ch.chapterId === "E026"
  )) ||

  (mode === "NA" && (
    ch.chapterId.startsWith("NA")
    || ch.chapterId === "E068"
    || ch.chapterId === "E069"
  )) ||

  (mode === "ND" && ch.chapterId.startsWith("ND"));
    
    if (!isTarget) return;

    ch.stages.forEach(st => {

      const detailKey = `${ch.chapterId}-${st.stageId}`;
      const detail = detailMap[detailKey];
      const showDetail = document.getElementById("showDetail").checked;

      const bossList = detail && detail.bosses && detail.bosses !== "なし"
        ? String(detail.bosses).split(",").map(s => normalize(s))
        : [];

      const matchedEnemy =
  name && st.enemies.map(normalize).includes(normalize(name));

const matchedCastle =
  castleParam && detail && String(detail.castleId) === String(castleParam);

const matchedBackground =
  backgroundParam && detail && String(detail.background) === String(backgroundParam);

if (matchedEnemy || matchedCastle || matchedBackground) {
  
        total++;

        const li = document.createElement("li");

        const table = document.createElement("table");
table.className = "stageTable";

// ▼ ALLモードのときだけ色分け
if (mode === "ALL") {

  if (ch.chapterId.startsWith("NA") || ch.chapterId === "E068" || ch.chapterId === "E069") {
    table.style.backgroundColor = "#ccff99"; // 真レジェンド（黄緑）
  }

  else if (ch.chapterId.startsWith("ND")) {
    table.style.backgroundColor = "#6f95c4"; // レジェンド0（紺）
  }
}

        // ステージ
        const tr1 = document.createElement("tr");
        tr1.innerHTML = `
          <th>ステージ</th>
          <td>${ch.chapterName}-${st.stageName}</td>
        `;

        if (showDetail && detail) {
  const castleImg = castleMap[String(detail.castleId)] || "";
  const bgImg = backgroundMap[String(detail.background)] || "";

  const imgTd = document.createElement("td");
  imgTd.rowSpan = 2;
  imgTd.style.textAlign = "right";
  imgTd.style.verticalAlign = "middle";
  imgTd.style.whiteSpace = "nowrap";

  imgTd.innerHTML = `
  <table class="sideInfoTable">
    <tr>
      <th class="sideLabel">
        敵城<br>背景
      </th>
      <td class="sideImages">
        ${castleImg ? `<img class="castleImg" src="${castleImg}" onerror="this.style.display='none'">` : ""}
        ${bgImg ? `<img class="bgImg" src="${bgImg}" onerror="this.style.display='none'">` : ""}
      </td>
    </tr>
  </table>
`;

  tr1.appendChild(imgTd);
}

        // 敵
        const tr2 = document.createElement("tr");
        const th = document.createElement("th");
        th.textContent = "出現する敵";

        const td = document.createElement("td");

        const showKanban = document.getElementById("showKanban").checked;

        st.enemies.forEach(enemyName => {

  // ▼ カンバン娘は画像表示しない
  if (!showKanban && normalize(enemyName) === normalize("カンバン娘")) return;

  const baseName = enemyName
    .replace(/\r?\n/g, "")
    .trim();

  const fileName = baseName
    .replace(/[：:]/g, "")
    .replace(/[ 　]+/g, "");

const img = document.createElement("img");
img.src = "image/" + encodeURIComponent(fileName) + ".png";
img.onerror = () => img.src = "image/noimage.png";

if (showDetail && bossList.includes(normalize(enemyName))) {
  img.style.outline = "3px solid #ffE500"; // 薄い黄色
}

td.appendChild(img);
});
        
        tr2.appendChild(th);
        tr2.appendChild(td);

        table.appendChild(tr1);
        table.appendChild(tr2);

        if (showDetail && detail) {
  const tr3 = document.createElement("tr");

  tr3.innerHTML = `
    <th>詳細</th>
    <td colspan="2">
      <div class="detailGrid">
        <div>
          <div class="detailLabel">城体力</div>
          <div class="detailValue">${Number(detail.castleHP).toLocaleString()}</div>
        </div>
        <div>
          <div class="detailLabel">城距離</div>
          <div class="detailValue">${detail.castleDistance}</div>
        </div>
        <div>
          <div class="detailLabel">統率力</div>
          <div class="detailValue">${detail.energy}</div>
        </div>
        <div>
          <div class="detailLabel">出撃制限</div>
          <div class="detailValue">${detail.unitLimit}</div>
        </div>
      </div>
    </td>
  `;

  table.appendChild(tr3);
}
        
        li.appendChild(table);
        ul.appendChild(li);
      }

    });

  });

  document.getElementById("count").textContent =
    total === 0 ? "見つかりませんでした" : total + "件見つかりました";
}

load();

  function goBack() {
  history.back();
}

</script>

</body>
</html>
