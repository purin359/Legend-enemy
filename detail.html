<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵詳細</title>

<style>
body { font-family: sans-serif; padding:20px; }

ul { list-style:none; padding-left:0; }

.stageTable {
  width:100%;
  border-collapse: collapse;
  margin-bottom:15px;
}

.stageTable th, .stageTable td {
  border:1px solid #ccc;
  padding:8px;
}

.stageTable th {
  width:120px;
  background:#f0f0f0;
}

img {
  width:40px;
  margin-right:5px;
}

.highlight {
  border:2px solid red;
}
</style>
</head>
<body>

<h2 id="title"></h2>
<p id="count"></p>

<ul id="list"></ul>

<script>
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

async function load() {
  const params = new URLSearchParams(location.search);
  const name = params.get("name");
  const mode = params.get("mode");

  document.getElementById("title").textContent = name;

  const stagesData = await fetch("stages.json").then(r=>r.json());
  const ul = document.getElementById("list");

  let total = 0;

  stagesData.forEach(ch => {

    const isTarget =
      (mode === "N"  && ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND")) ||
      (mode === "NA" && ch.chapterId.startsWith("NA")) ||
      (mode === "ND" && ch.chapterId.startsWith("ND"));

    if (!isTarget) return;

    ch.stages.forEach(st => {

      if (st.enemies.map(normalize).includes(normalize(name))) {

        total++;

        const li = document.createElement("li");

        const table = document.createElement("table");
        table.className = "stageTable";

        // ステージ
        const tr1 = document.createElement("tr");
        tr1.innerHTML = `
          <th>ステージ</th>
          <td>${ch.chapterName}-${st.stageName}</td>
        `;

        // 敵
        const tr2 = document.createElement("tr");
        const th = document.createElement("th");
        th.textContent = "出現する敵";

        const td = document.createElement("td");

        st.enemies.forEach(enemyName => {

          const safeName = enemyName
            .replace(/\r?\n/g, "")
            .trim();

          const img = document.createElement("img");
          img.src = "image/" + encodeURIComponent(safeName) + ".png";
          img.onerror = () => img.src = "image/noimage.png";

          if (normalize(enemyName) === normalize(name)) {
            img.classList.add("highlight");
          }

          td.appendChild(img);
        });

        tr2.appendChild(th);
        tr2.appendChild(td);

        table.appendChild(tr1);
        table.appendChild(tr2);

        li.appendChild(table);
        ul.appendChild(li);
      }

    });

  });

  document.getElementById("count").textContent =
    total === 0 ? "見つかりませんでした" : total + "件見つかりました";
}

load();
</script>

</body>
</html>
