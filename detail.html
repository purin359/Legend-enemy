<script>
async function load() {
  const params = new URLSearchParams(location.search);
  const name = params.get("name");

  document.getElementById("title").textContent = name;

  const stagesData = await fetch("stages.json").then(r=>r.json());

  const ul = document.getElementById("list");

  stagesData.forEach(ch => {
    ch.stages.forEach(st => {

      if (st.enemies.includes(name)) {

        const li = document.createElement("li");

        // ステージ名
        const title = document.createElement("div");
        title.textContent =
          `${ch.chapterId}-${st.stageId} ${ch.chapterName}-${st.stageName}`;

        // 敵画像エリア
        const imgWrap = document.createElement("div");

        st.enemies.forEach(enemyName => {
          const safeName = enemyName
            .replace(/\r?\n/g, "")
            .trim();

          const img = document.createElement("img");
          img.src = "image/" + encodeURIComponent(safeName) + ".png";
          img.style.width = "40px";
          img.style.marginRight = "5px";

          imgWrap.appendChild(img);
        });

        li.appendChild(title);
        li.appendChild(imgWrap);

        ul.appendChild(li);
      }

    });
  });
}

load();
</script>
