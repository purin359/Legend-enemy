<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵詳細２</title>

<style>
body { font-family: sans-serif; padding:20px; }

li { margin-bottom:15px; }

.stageTitle {
  font-weight: bold;
  margin-bottom:5px;
}

.imgWrap img {
  width:40px;
  margin-right:5px;
}

.highlight {
  border:2px solid red;
}

  .stageTable {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 15px;
}

.stageTable th,
.stageTable td {
  border: 1px solid #ccc;
  padding: 8px;
}

.stageTable th {
  width: 120px;
  background: #f0f0f0;
  text-align: left;
}

.enemyImg {
  width: 40px;
  margin-right: 5px;
}
  
  ul {
  list-style: none;
  padding-left: 0;
}
  
</style>
</head>
<body>

<h2 id="title"></h2>

  <p id="count"></p>

<ul id="list"></ul>

<script>
async function load() {
  const params = new URLSearchParams(location.search);
  const name = params.get("name");
  const mode = params.get("mode");

  document.getElementById("title").textContent = name;

  const stagesData = await fetch("stages.json").then(r=>r.json());
  const ul = document.getElementById("list");

  let total = 0;

  stagesData.forEach(ch => {

  const isTarget =
    (mode === "N"  && /^N\d/.test(ch.chapterId)) ||
    (mode === "NA" && ch.chapterId.startsWith("NA")) ||
    (mode === "ND" && ch.chapterId.startsWith("ND"));

  if (!isTarget) return;
    
    ch.stages.forEach(st => {

      if (st.enemies.includes(name)) {
  total++;

        const li = document.createElement("li");

const table = document.createElement("table");
table.className = "stageTable";

// --- ステージ行 ---
const tr1 = document.createElement("tr");

const th1 = document.createElement("th");
th1.textContent = "ステージ";

const td1 = document.createElement("td");
td1.textContent =
  `${ch.chapterName}-${st.stageName}`;

tr1.appendChild(th1);
tr1.appendChild(td1);

// --- 敵行 ---
const tr2 = document.createElement("tr");

const th2 = document.createElement("th");
th2.textContent = "出現する敵";

const td2 = document.createElement("td");

st.enemies.forEach(enemyName => {
  const safeName = enemyName
    .replace(/\r?\n/g, "")
    .trim();

  const img = document.createElement("img");
  img.src = "image/" + encodeURIComponent(safeName) + ".png";
  img.className = "enemyImg";

  img.onerror = () => img.src = "image/noimage.png";
  img.title = enemyName;

  td2.appendChild(img);
});

tr2.appendChild(th2);
tr2.appendChild(td2);

// --- まとめ ---
table.appendChild(tr1);
table.appendChild(tr2);

li.appendChild(table);
ul.appendChild(li);
      }

    });
  });

  document.getElementById("count").textContent =
  total === 0 ? "見つかりませんでした" : total + "件見つかりました";
}

load();
</script>

</body>
</html>
