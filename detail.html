<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵詳細</title>

<style>
body { font-family: sans-serif; padding:20px; }

ul { list-style:none; padding-left:0; }

.stageTable {
  width:100%;
  border-collapse: collapse;
  margin-bottom:15px;
}

.stageTable th, .stageTable td {
  border:1px solid #ccc;
  padding:8px;
}

.stageTable th {
  width:120px;
  background:#f0f0f0;
}

img {
  width:40px;
  margin-right:5px;
}

.highlight {
  border:2px solid red;
}

</style>
</head>
<body>

<button onclick="goBack()">戻る</button>

<h2 id="title"></h2>
<p id="count"></p>
  <label>
  <input type="checkbox" id="showKanban" onchange="load()">
  カンバン娘を表示
</label>
<label>
  <input type="checkbox" id="showDetail" onchange="load()">
  詳細表示
</label>

<ul id="list"></ul>

<script>
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

async function load() {
  const params = new URLSearchParams(location.search);
  const name = params.get("name");
  const mode = params.get("mode");

  document.getElementById("title").textContent = name;

 const stagesData = await fetch("stages.json").then(r=>r.json());
const stageDetailsData = await fetch("stageDetails.json").then(r=>r.ok ? r.json());
const castlesData = await fetch("castle.json").then(r=>r.ok ? r.json());
const backgroundsData = await fetch("backgrounds.json").then(r=>r.ok ? r.json());

const detailMap = {};

const stageDetailList = Array.isArray(stageDetailsData)
  ? stageDetailsData
  : Object.values(stageDetailsData);

stageDetailList.forEach(ch => {
  ch.stages.forEach(st => {
    detailMap[`${ch.chapterId}-${st.stageId}`] = st;
  });
});
  
const castleMap = {};
const castleList = Array.isArray(castlesData)
  ? castlesData
  : Object.values(castlesData);

castleList.forEach(c => {
  castleMap[String(c.castleId)] = c.image;
});

const backgroundMap = {};
const backgroundList = Array.isArray(backgroundsData)
  ? backgroundsData
  : Object.values(backgroundsData);

backgroundList.forEach(bg => {
  backgroundMap[String(bg.background)] = bg.image;
});
  
  const ul = document.getElementById("list");
  ul.innerHTML = "";

  let total = 0;

  stagesData.forEach(ch => {

    const isTarget =
  (mode === "ALL") ||

  (mode === "N" && (
    (ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND"))
    || ch.chapterId === "E026"
  )) ||

  (mode === "NA" && (
    ch.chapterId.startsWith("NA")
    || ch.chapterId === "E068"
    || ch.chapterId === "E069"
  )) ||

  (mode === "ND" && ch.chapterId.startsWith("ND"));
    
    if (!isTarget) return;

    ch.stages.forEach(st => {

      const detailKey = `${ch.chapterId}-${st.stageId}`;
      const detail = detailMap[detailKey];
      const showDetail = document.getElementById("showDetail").checked;

      const bossList = detail && detail.bosses && detail.bosses !== "なし"
        ? String(detail.bosses).split(",").map(s => normalize(s))
        : [];

      if (st.enemies.map(normalize).includes(normalize(name))) {

        total++;

        const li = document.createElement("li");

        const table = document.createElement("table");
table.className = "stageTable";

// ▼ ALLモードのときだけ色分け
if (mode === "ALL") {

  if (ch.chapterId.startsWith("NA") || ch.chapterId === "E068" || ch.chapterId === "E069") {
    table.style.backgroundColor = "#ccff99"; // 真レジェンド（黄緑）
  }

  else if (ch.chapterId.startsWith("ND")) {
    table.style.backgroundColor = "#6f95c4"; // レジェンド0（紺）
  }
}

        // ステージ
        const tr1 = document.createElement("tr");
        tr1.innerHTML = `
          <th>ステージ</th>
          <td>${ch.chapterName}-${st.stageName}</td>
        `;

        // 敵
        const tr2 = document.createElement("tr");
        const th = document.createElement("th");
        th.textContent = "出現する敵";

        const td = document.createElement("td");

        const showKanban = document.getElementById("showKanban").checked;

        st.enemies.forEach(enemyName => {

  // ▼ カンバン娘は画像表示しない
  if (!showKanban && normalize(enemyName) === normalize("カンバン娘")) return;

  const baseName = enemyName
    .replace(/\r?\n/g, "")
    .trim();

  const fileName = baseName
    .replace(/[：:]/g, "")
    .replace(/[ 　]+/g, "");

 const imgWrap = document.createElement("span");
imgWrap.style.display = "inline-block";
imgWrap.style.padding = "3px";
imgWrap.style.borderRadius = "6px";
imgWrap.style.marginRight = "5px";

if (bossList.includes(normalize(enemyName))) {
  imgWrap.style.background = "#fff3b0"; // 薄い黄色
}

const img = document.createElement("img");
img.src = "image/" + encodeURIComponent(fileName) + ".png";
img.onerror = () => img.src = "image/noimage.png";

imgWrap.appendChild(img);
td.appendChild(imgWrap);
});
        
        tr2.appendChild(th);
        tr2.appendChild(td);

        table.appendChild(tr1);
        table.appendChild(tr2);

        if (showDetail && detail) {
  const castleImg = castleMap[detail.castleId] || "";
  const bgImg = backgroundMap[detail.background] || "";

  const tr3 = document.createElement("tr");
  tr3.innerHTML = `
    <th>詳細</th>
    <td>
      <div>
        ${castleImg ? `<img src="${castleImg}" style="width:50px;" onerror="this.style.display='none'">` : ""}
        ${bgImg ? `<img src="${bgImg}" style="width:80px;" onerror="this.style.display='none'">` : ""}
      </div>
      城ID: ${detail.castleId}<br>
      背景: ${detail.background}<br>
      城体力: ${detail.castleHP}<br>
      城距離: ${detail.castleDistance}<br>
      統率力: ${detail.energy}<br>
      出撃制限数: ${detail.unitLimit}<br>
      ボス: ${detail.bosses}
    </td>
  `;
  table.appendChild(tr3);
}
        
        li.appendChild(table);
        ul.appendChild(li);
      }

    });

  });

  document.getElementById("count").textContent =
    total === 0 ? "見つかりませんでした" : total + "件見つかりました";
}

load();

  function goBack() {
  history.back();
}

</script>

</body>
</html>
