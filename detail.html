<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵詳細</title>

<style>
body { font-family: sans-serif; padding:20px; }

li { margin-bottom:15px; }

.stageTitle {
  font-weight: bold;
  margin-bottom:5px;
}

.imgWrap img {
  width:40px;
  margin-right:5px;
}

.highlight {
  border:2px solid red;
}
</style>
</head>
<body>

<h2 id="title"></h2>

<ul id="list"></ul>

<script>
async function load() {
  const params = new URLSearchParams(location.search);
  const name = params.get("name");

  document.getElementById("title").textContent = name;

  const stagesData = await fetch("stages.json").then(r=>r.json());
  const ul = document.getElementById("list");

  stagesData.forEach(ch => {
    ch.stages.forEach(st => {

      if (st.enemies.includes(name)) {

        const li = document.createElement("li");

        // ステージ名
        const title = document.createElement("div");
        title.className = "stageTitle";
        title.textContent =
          `${ch.chapterId}-${st.stageId} ${ch.chapterName}-${st.stageName}`;

        // 敵画像エリア
        const imgWrap = document.createElement("div");
        imgWrap.className = "imgWrap";

        st.enemies.forEach(enemyName => {
          const safeName = enemyName
            .replace(/\r?\n/g, "")
            .trim();

          const img = document.createElement("img");
          img.src = "image/" + encodeURIComponent(safeName) + ".png";

          // 画像ない場合
          img.onerror = () => img.src = "image/noimage.png";

          // ホバーで名前
          img.title = enemyName;

          // 選択された敵を強調
          if (enemyName === name) {
            img.classList.add("highlight");
          }

          imgWrap.appendChild(img);
        });

        li.appendChild(title);
        li.appendChild(imgWrap);

        ul.appendChild(li);
      }

    });
  });
}

load();
</script>

</body>
</html>
