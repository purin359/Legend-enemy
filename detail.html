<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>敵詳細</title>

<style>
body { font-family: sans-serif; padding:20px; }

ul { list-style:none; padding-left:0; }

.stageTable {
  width:100%;
  border-collapse: collapse;
  margin-bottom:15px;
}

.stageTable th, .stageTable td {
  border:1px solid #ccc;
  padding:8px;
}

.stageTable th {
  width:120px;
  background:#f0f0f0;
}

img {
  width:40px;
  margin-right:5px;
}

.highlight {
  border:2px solid red;
}

.castleImg {
  height: 90px;
  width: auto;
  object-fit: contain;
  vertical-align: middle;
}

.bgImg {
  width: 100px;
  height: 60px;
  object-fit: cover;
  vertical-align: middle;
}

.detailGrid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.detailGrid > div {
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 8px;
  text-align: center;
  background: #fafafa;
}

.detailLabel {
  font-size: 13px;
  color: #555;
}

.detailValue {
  font-size: 16px;
  font-weight: bold;
}

  .sideInfoTable {
  border-collapse: collapse;
  margin-left: auto;
  width: auto;
}

.sideInfoTable th,
.sideInfoTable td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
  vertical-align: middle;
}

.sideInfoTable th {
  background: #f0f0f0;
  width: 60px;
}

.castleImg {
  height: 80px;
  width: auto;
  object-fit: contain;
}

.bgImg {
  width: 100px;
  height: 55px;
  object-fit: cover;
}

</style>
</head>
<body>

<button onclick="goBack()">戻る</button>

<h2 id="title"></h2>
<p id="count"></p>
  <label>
  <input type="checkbox" id="showKanban" onchange="load()">
  カンバン娘を表示
</label>
<label>
  <input type="checkbox" id="showDetail" onchange="load()">
  詳細表示
</label>

<ul id="list"></ul>

<script>
function normalize(str) {
  return str
    .replace(/\r?\n/g, "")
    .replace(/[ 　]+/g, "")
    .trim();
}

async function load() {
  const params = new URLSearchParams(location.search);
  const name = params.get("name");
  const mode = params.get("mode");

  document.getElementById("title").textContent = name;

 const stagesData = await fetch("stages.json").then(r => r.json());

const stageDetailsData = await fetch("stageDetails.json")
  .then(r => r.ok ? r.json() : [])
  .catch(() => []);

const castlesData = await fetch("castles.json")
  .then(r => r.ok ? r.json() : [])
  .catch(() => []);

const backgroundsData = await fetch("backgrounds.json")
  .then(r => r.ok ? r.json() : [])
  .catch(() => []);
  
const detailMap = {};

const stageDetailList = Array.isArray(stageDetailsData)
  ? stageDetailsData
  : Object.values(stageDetailsData);

stageDetailList.forEach(ch => {
  ch.stages.forEach(st => {
    detailMap[`${ch.chapterId}-${st.stageId}`] = st;
  });
});
  
const castleMap = {};
const castleList = Array.isArray(castlesData)
  ? castlesData
  : Object.values(castlesData);

castleList.forEach(c => {
  castleMap[String(c.castleId)] = c.image;
});

const backgroundMap = {};
const backgroundList = Array.isArray(backgroundsData)
  ? backgroundsData
  : Object.values(backgroundsData);

backgroundList.forEach(bg => {
  backgroundMap[String(bg.background)] = bg.image;
});
  
  const ul = document.getElementById("list");
  ul.innerHTML = "";

  let total = 0;

  stagesData.forEach(ch => {

    const isTarget =
  (mode === "ALL") ||

  (mode === "N" && (
    (ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND"))
    || ch.chapterId === "E026"
  )) ||

  (mode === "NA" && (
    ch.chapterId.startsWith("NA")
    || ch.chapterId === "E068"
    || ch.chapterId === "E069"
  )) ||

  (mode === "ND" && ch.chapterId.startsWith("ND"));
    
    if (!isTarget) return;

    ch.stages.forEach(st => {

      const detailKey = `${ch.chapterId}-${st.stageId}`;
      const detail = detailMap[detailKey];
      const showDetail = document.getElementById("showDetail").checked;

      const bossList = detail && detail.bosses && detail.bosses !== "なし"
        ? String(detail.bosses).split(",").map(s => normalize(s))
        : [];

      if (st.enemies.map(normalize).includes(normalize(name))) {

        total++;

        const li = document.createElement("li");

        const table = document.createElement("table");
table.className = "stageTable";

// ▼ ALLモードのときだけ色分け
if (mode === "ALL") {

  if (ch.chapterId.startsWith("NA") || ch.chapterId === "E068" || ch.chapterId === "E069") {
    table.style.backgroundColor = "#ccff99"; // 真レジェンド（黄緑）
  }

  else if (ch.chapterId.startsWith("ND")) {
    table.style.backgroundColor = "#6f95c4"; // レジェンド0（紺）
  }
}

        // ステージ
        const tr1 = document.createElement("tr");
        tr1.innerHTML = `
          <th>ステージ</th>
          <td>${ch.chapterName}-${st.stageName}</td>
        `;

        if (showDetail && detail) {
  const castleImg = castleMap[String(detail.castleId)] || "";
  const bgImg = backgroundMap[String(detail.background)] || "";

  const imgTd = document.createElement("td");
  imgTd.rowSpan = 2;
  imgTd.style.textAlign = "right";
  imgTd.style.verticalAlign = "middle";
  imgTd.style.whiteSpace = "nowrap";

  imgTd.innerHTML = `
  <table class="sideInfoTable">
    <tr>
      <th>敵城</th>
      <td>
        ${castleImg ? `<img class="castleImg" src="${castleImg}" onerror="this.style.display='none'">` : ""}
      </td>
    </tr>
    <tr>
      <th>背景</th>
      <td>
        ${bgImg ? `<img class="bgImg" src="${bgImg}" onerror="this.style.display='none'">` : ""}
      </td>
    </tr>
  </table>
`;

  tr1.appendChild(imgTd);
}

        // 敵
        const tr2 = document.createElement("tr");
        const th = document.createElement("th");
        th.textContent = "出現する敵";

        const td = document.createElement("td");

        const showKanban = document.getElementById("showKanban").checked;

        st.enemies.forEach(enemyName => {

  // ▼ カンバン娘は画像表示しない
  if (!showKanban && normalize(enemyName) === normalize("カンバン娘")) return;

  const baseName = enemyName
    .replace(/\r?\n/g, "")
    .trim();

  const fileName = baseName
    .replace(/[：:]/g, "")
    .replace(/[ 　]+/g, "");

const img = document.createElement("img");
img.src = "image/" + encodeURIComponent(fileName) + ".png";
img.onerror = () => img.src = "image/noimage.png";

if (showDetail && bossList.includes(normalize(enemyName))) {
  img.style.outline = "3px solid #ffE500"; // 薄い黄色
}

td.appendChild(img);
});
        
        tr2.appendChild(th);
        tr2.appendChild(td);

        table.appendChild(tr1);
        table.appendChild(tr2);

        if (showDetail && detail) {
  const tr3 = document.createElement("tr");

  tr3.innerHTML = `
    <th>詳細</th>
    <td colspan="2">
      <div class="detailGrid">
        <div>
          <div class="detailLabel">城体力</div>
          <div class="detailValue">${detail.castleHP}</div>
        </div>
        <div>
          <div class="detailLabel">城距離</div>
          <div class="detailValue">${detail.castleDistance}</div>
        </div>
        <div>
          <div class="detailLabel">統率力</div>
          <div class="detailValue">${detail.energy}</div>
        </div>
        <div>
          <div class="detailLabel">出撃制限</div>
          <div class="detailValue">${detail.unitLimit}</div>
        </div>
      </div>
    </td>
  `;

  table.appendChild(tr3);
}
        
        li.appendChild(table);
        ul.appendChild(li);
      }

    });

  });

  document.getElementById("count").textContent =
    total === 0 ? "見つかりませんでした" : total + "件見つかりました";
}

load();

  function goBack() {
  history.back();
}

</script>

</body>
</html>
