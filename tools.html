<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>その他の機能</title>
<style>
body {
  font-family: sans-serif;
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

button {
  font-size: 16px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #4CAF50;
  color: white;
  margin: 6px;
}

.menu {
  display: grid;
  gap: 10px;
  margin-top: 20px;
}

  .mainBtn {
  font-size: 16px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

.mainBtn:hover {
  background: #45a049;
}

  .backBtn {
  font-size: 16px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid #666;
  background: #f5f5f5;
  color: #333;
  cursor: pointer;
}

.backBtn:hover {
  background: #e5e5e5;
}
</style>
</head>
<body>

<button class="backBtn" onclick="location.href='index.html'">戻る</button>
  
<h2>その他の機能</h2>



</body>
</html>
