<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>その他の機能</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: sans-serif;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.menu {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 20px;
}
  
.funcBtn {
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: #f5f5f5;
  cursor: pointer;
  transition: 0.2s;
}

/* ホバー */
.funcBtn:hover {
  background: #e0e0e0;
}

/* 選択中（超重要） */
.funcBtn.active {
  background: #4CAF50;
  color: white;
  border-color: #4CAF50;
  font-weight: bold;
}

.funcArea {
  display: none;
  margin-top: 20px;
}

.searchWrap {
  position: relative;
  margin-top: 10px;
}

#suggest {
  border: 1px solid #ccc;
  max-height: 150px;
  overflow-y: auto;
  background: white;
  position: absolute;
  width: 250px;
  z-index: 10;
}

.suggestItem {
  padding: 6px;
  cursor: pointer;
}

.suggestItem:hover {
  background: #eee;
}

  .suggestItem.active {
  background: #cfe8ff;
}

canvas {
  margin-top: 20px;
}

  .detailTable {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

.detailTable th,
.detailTable td {
  border: 1px solid #ccc;
  padding: 8px;
  vertical-align: middle;
}

.detailTable th {
  background: #f0f0f0;
  text-align: center;
}

.detailTable td {
  text-align: center;
}

.detailTable td.chapterCell,
.detailTable td.stageCell {
  text-align: left;
}

.detailTable td.numCell {
  text-align: center;
}

  .detailTable thead th {
  position: sticky;
  top: 0;
  z-index: 5;
  background: #f0f0f0;
}

  #bossList .detailTable {
  table-layout: fixed;
}

#bossList .detailTable th:nth-child(1),
#bossList .detailTable td:nth-child(1) {
  width: 65px;
  text-align: center;
}

#bossList .detailTable th:nth-child(2),
#bossList .detailTable td:nth-child(2) {
  width: 200px;
  text-align: left;
}

#bossList .detailTable th:nth-child(3),
#bossList .detailTable td:nth-child(3) {
  width: 70px;
  text-align: center;
}

#bossList .detailTable th:nth-child(4),
#bossList .detailTable td:nth-child(4) {
  width: 70px;
  text-align: center;
}

#bossList .detailTable th:nth-child(5),
#bossList .detailTable td:nth-child(5) {
  width: auto;
  text-align: left;
}

  #bossList .detailTable img {
  width: 50px;
  margin-right: 0;
}

  #bossList .detailTable thead th {
    text-align: center !important;
  }

  .stageLink {
  color: #1976d2;
  text-decoration: underline;
  cursor: pointer;
}

  .sameBox {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 10px;
  margin-top: 12px;
  background: #fafafa;
}

.sameEnemies {
  margin-bottom: 8px;
}

.sameEnemies img {
  width: 40px;
  margin-right: 4px;
}

.sameStages {
  margin: 0;
  padding-left: 18px;
}

  .sameAttrIcons {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin: 10px 0;
}

.sameAttrIcons button {
  width: 44px;
  height: 44px;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #f8f8f8;
  cursor: pointer;
}

.sameAttrIcons button.active {
  border-color: #4CAF50;
  background: #eaf7ea;
}

.sameAttrIcons img {
  width: 28px;
  margin: 0;
}

.sameAttrBox {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 10px;
  margin-top: 12px;
  background: #fafafa;
}

.sameAttrEnemyIcons img {
  width: 36px;
  margin-right: 4px;
}

  .sameAttrIcons button {
  min-width: 44px;
  height: 44px;
}

  #bossAttrList td:first-child,
#bossAttrList th:first-child {
  width: 60px;
  text-align: center;
}

</style>
</head>

<body>

<button onclick="history.back()">戻る</button>

<h2>その他</h2>

<div class="menu">
  <button class="funcBtn active" onclick="openFunc('detailSort', this)">詳細並び替え</button>
  <button class="funcBtn" onclick="openFunc('bossList', this)">ボス一覧</button>
  <button class="funcBtn" onclick="openFunc('bossAttrList', this)">ボス属性</button>
  <button class="funcBtn" onclick="openFunc('sameEnemyList', this)">同じ構成</button>
  <button class="funcBtn" onclick="openFunc('enemyTypeCount', this)">敵種類数</button>
  <button class="funcBtn" onclick="openFunc('sameAttrStage', this)">単属性ステージ</button>
  <button class="funcBtn" onclick="openFunc('stageAttrList', this)">ステージ別属性一覧</button>
  <button class="funcBtn" onclick="openFunc('energyTotal', this)">章別統率力</button>
  <button class="funcBtn" onclick="openFunc('graph', this)">登場ステージグラフ</button>
</div>
  
<!-- グラフ機能 -->
<div id="graph" class="funcArea">

  <h3>敵の登場ステージグラフ</h3>

  <select id="mode" onchange="drawGraph()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

  <div class="searchWrap">
  <input id="enemyInput" placeholder="敵名を入力">
  <button type="button" onclick="clearEnemyInput()">×</button>
  <div id="suggest"></div>
</div>

  <div id="info"></div>

  <canvas id="chart"></canvas>
<label id="showStageEnemiesLabel" style="display:none;">
  <input type="checkbox" id="showStageEnemies" onchange="redrawStageList()">
  構成あり
</label>
<div id="stageList"></div>
</div>

  <!-- 詳細並び替え機能 -->
<div id="detailSort" class="funcArea">

  <h3>ステージ詳細並び替え</h3>

  <select id="detailMode" onchange="drawDetailTable()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

<select id="detailSortKey" onchange="changeDetailSort()">
  <option value="stageOrder">ステージ順</option>
  <option value="castleHP" selected>城体力</option>
  <option value="bossPosition">ボス位置</option>
  <option value="castleDistance">城距離</option>
  <option value="energy">統率力</option>
  <option value="unitLimit">出撃制限</option>
</select>

  <button id="detailOrderBtn" onclick="toggleDetailOrder()">降順</button>

  <table class="detailTable">
    <thead>
      <tr>
        <th>章名</th>
        <th>ステージ名</th>
        <th>城体力</th>
        <th>ボス位置</th>
        <th>城距離</th>
        <th>統率力</th>
        <th>出撃制限</th>
      </tr>
    </thead>
    <tbody id="detailTableBody"></tbody>
  </table>

</div>

  <div id="bossList" class="funcArea">
  <h3>ボス一覧</h3>

  <select id="bossMode" onchange="drawBossTable()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

  <select id="bossRateType" onchange="drawBossTable()">
    <option value="fraction">分数</option>
    <option value="decimal">%表示</option>
  </select>

  <select id="bossSort" onchange="drawBossTable()">
    <option value="count">ボス回数順</option>
    <option value="rate">ボス率順</option>
    <option value="first">初ボス順</option>
  </select>

  <table class="detailTable">
    <thead>
      <tr>
        <th>画像</th>
        <th>敵名</th>
        <th>ボス回数</th>
        <th>ボス率</th>
        <th>初ボスステージ</th>
      </tr>
    </thead>
    <tbody id="bossTableBody"></tbody>
  </table>
  </div>

    <div id="sameEnemyList" class="funcArea">
  <h3>同じ構成のステージ一覧</h3>

  <select id="sameOrderType" onchange="drawSameEnemyList()">
    <option value="same">並びも一致</option>
    <option value="ignore">順不同</option>
  </select>

  <label>
    <input type="checkbox" id="sameShowKanban" onchange="drawSameEnemyList()">
    カンバン娘を含める
  </label>

  <div id="sameCountInfo" style="margin:10px 0; font-weight:bold;"></div>
<div id="sameEnemyArea"></div>
</div>

  <div id="enemyTypeCount" class="funcArea">
  <h3>敵種類数別ステージ数</h3>

  <select id="typeCountMode" onchange="drawEnemyTypeCount()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

  <label>
    <input type="checkbox" id="typeCountShowKanban" onchange="drawEnemyTypeCount()">
    カンバン娘を含める
  </label>

  <table class="detailTable">
    <thead>
      <tr>
        <th>種類数</th>
        <th>数</th>
        <th>一覧</th>
      </tr>
    </thead>
    <tbody id="typeCountTableBody"></tbody>
  </table>
</div>

  <div id="sameAttrStage" class="funcArea">
  <h3>全てが同じ属性のステージ</h3>

  <select id="sameAttrMode" onchange="drawSameAttrStage()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

  <label>
    <input type="checkbox" id="sameAttrShowKanban" onchange="drawSameAttrStage()">
    カンバン娘を含める
  </label>

  <label>
    <input type="checkbox" id="sameAttrIgnoreCastle" onchange="drawSameAttrStage()" checked>
    城を判定対象から省く
  </label>

  <div class="sameAttrIcons">
    <button onclick="selectSameAttr('ALL')">全</button>
    <button onclick="selectSameAttr('赤')"><img src="image_type/赤.png"></button>
    <button onclick="selectSameAttr('浮き')"><img src="image_type/浮き.png"></button>
    <button onclick="selectSameAttr('黒')"><img src="image_type/黒.png"></button>
    <button onclick="selectSameAttr('メタル')"><img src="image_type/メタル.png"></button>
    <button onclick="selectSameAttr('天使')"><img src="image_type/天使.png"></button>
    <button onclick="selectSameAttr('エイリアン')"><img src="image_type/エイリアン.png"></button>
    <button onclick="selectSameAttr('ゾンビ')"><img src="image_type/ゾンビ.png"></button>
    <button onclick="selectSameAttr('悪魔')"><img src="image_type/悪魔.png"></button>
    <button onclick="selectSameAttr('古代種')"><img src="image_type/古代種.png"></button>
    <button onclick="selectSameAttr('無属性')"><img src="image_type/無属性.png"></button>
  </div>

  <div id="sameAttrInfo" style="margin:10px 0;font-weight:bold;"></div>
  <div id="sameAttrArea"></div>
</div>

  <div id="stageAttrList" class="funcArea">
  <h3>ステージ別属性一覧</h3>

  <select id="stageAttrMode" onchange="drawStageAttrList()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

  <label>
    <input type="checkbox" id="stageAttrShowKanban" onchange="drawStageAttrList()">
    カンバン娘を含める
  </label>

  <select id="stageAttrViewType" onchange="drawStageAttrList()">
    <option value="list">リスト表示</option>
    <option value="group">属性まとめ</option>
  </select>

  <select id="stageAttrSortKey" onchange="drawStageAttrList()">
    <option value="stageOrder">ステージ順</option>
    <option value="attrCount">属性数順</option>
  </select>

  <button id="stageAttrOrderBtn" onclick="toggleStageAttrOrder()">昇順</button>

  <select id="stageAttrCountFilter" onchange="drawStageAttrList()" style="display:none;">
    <option value="ALL">属性数 全表示</option>
  </select>

  <label id="stageAttrEnemyToggleWrap" style="display:none;">
    <input type="checkbox" id="stageAttrShowEnemies" onchange="drawStageAttrList()">
    敵構成表示
  </label>

  <div id="stageAttrInfo" style="margin:10px 0;font-weight:bold;"></div>
  <div id="stageAttrArea"></div>
</div>

  <div id="energyTotal" class="funcArea">
  <h3>各章の合計統率力</h3>

  <select id="energyMode" onchange="drawEnergyTotal()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

  <table class="detailTable">
    <thead>
      <tr>
        <th>章名</th>
        <th>ステージ数</th>
        <th>合計統率力</th>
      </tr>
    </thead>
    <tbody id="energyTotalBody"></tbody>
  </table>
</div>

  <div id="bossAttrList" class="funcArea">
  <h3>ボスになりやすい属性</h3>

  <select id="bossAttrMode" onchange="drawBossAttrTable()">
    <option value="ALL">全て</option>
    <option value="N">レジェンド</option>
    <option value="NA">真レジェンド</option>
    <option value="ND">レジェンド0</option>
  </select>

  <select id="bossAttrSort" onchange="drawBossAttrTable()">
    <option value="rate">ボス率順</option>
    <option value="bossCount">ボス回数順</option>
    <option value="appearCount">出現回数順</option>
    <option value="order">属性順</option>
  </select>

  <table class="detailTable">
    <thead>
      <tr>
        <th>属性</th>
        <th>ボス回数</th>
        <th>出現回数</th>
        <th>ボス率</th>
        <th>ボス敵数</th>
      </tr>
    </thead>
    <tbody id="bossAttrTableBody"></tbody>
  </table>
    <h4>属性内訳</h4>
<div id="bossAttrDetail"></div>
</div>
<script>
let stagesData = [];
let enemiesData = [];
let enemyNames = [];
let selectedEnemy = "";
let chart;
let graphStageMap = {};
let maxStage = 0;
let lastSelectedPos = null;
let suggestIndex = -1;
let currentSuggestList = [];
let stageDetailsData = [];
let detailDesc = true;
let castlesData = [];
let castleMap = {};

function normalize(str) {
  return String(str)
    .replace(/\r?\n/g, "")
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
    )
    .replace(/[ァ-ン]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0x60)
    )
    .replace(/[：:]/g, "")
    .replace(/[ 　]+/g, "")
    .toLowerCase()
    .trim();
}

function openFunc(id, btn) {
  document.querySelectorAll(".funcArea").forEach(el => {
    el.style.display = "none";
  });

  document.getElementById(id).style.display = "block";

  document.querySelectorAll(".funcBtn").forEach(b => {
    b.classList.remove("active");
  });

  btn.classList.add("active");

  if (id === "detailSort") {
    drawDetailTable();
  }

  if (id === "bossList") {
    drawBossTable();
  }

  if (id === "sameEnemyList") {
    drawSameEnemyList();
  }

  if (id === "enemyTypeCount") {
    drawEnemyTypeCount();
  }

  if (id === "sameAttrStage") {
    drawSameAttrStage();
  }

  if (id === "stageAttrList") {
    drawStageAttrList();
  }

  if (id === "energyTotal") {
    drawEnergyTotal();
  }

  if (id === "bossAttrList") {
    drawBossAttrTable();
  }
}

async function init() {
  stagesData = await fetch("stages.json").then(r => r.json());
  enemiesData = await fetch("enemies.json").then(r => r.json());

  stageDetailsData = await fetch("stageDetails.json")
    .then(r => r.ok ? r.json() : [])
    .catch(() => []);

  castlesData = await fetch("castles.json")
    .then(r => r.ok ? r.json() : [])
    .catch(() => []);

  castleMap = {};
  castlesData.forEach(c => {
    castleMap[String(c.castleId)] = {
      image: c.image,
      bossPosition: c.bossPosition !== undefined ? Number(c.bossPosition) : ""
    };
  });

  enemyNames = Object.values(enemiesData).map(e => e.name);

  setupSuggest();

  openFunc("detailSort", document.querySelectorAll(".funcBtn")[0]);
}
  
function setupSuggest() {
  const input = document.getElementById("enemyInput");
  const suggest = document.getElementById("suggest");

  input.addEventListener("input", () => {
    const key = normalize(input.value);
    suggest.innerHTML = "";
    suggestIndex = -1;
    currentSuggestList = [];

    if (!key) return;

    currentSuggestList = enemyNames
      .filter(n => normalize(n).includes(key))
      .slice(0, 20);

    currentSuggestList.forEach((name, i) => {
      const div = document.createElement("div");
      div.className = "suggestItem";
      div.textContent = name;
      div.onclick = () => selectSuggest(name);
      suggest.appendChild(div);
    });
  });

  input.addEventListener("keydown", e => {
    if (e.isComposing || e.keyCode === 229) return;
    if (currentSuggestList.length === 0) return;

    if (e.key === "ArrowDown") {
      e.preventDefault();
      suggestIndex = (suggestIndex + 1) % currentSuggestList.length;
      updateSuggestSelection();
    }

    if (e.key === "ArrowUp") {
      e.preventDefault();
      suggestIndex = (suggestIndex - 1 + currentSuggestList.length) % currentSuggestList.length;
      updateSuggestSelection();
    }

    if (e.key === "Enter") {
      e.preventDefault();
      if (suggestIndex < 0) suggestIndex = 0;
      selectSuggest(currentSuggestList[suggestIndex]);
    }
  });
}

function selectSuggest(name) {
  selectedEnemy = name;
  document.getElementById("enemyInput").value = name;
  document.getElementById("suggest").innerHTML = "";
  suggestIndex = -1;
  currentSuggestList = [];
  drawGraph();
}

function updateSuggestSelection() {
  document.querySelectorAll(".suggestItem").forEach((item, i) => {
    item.classList.toggle("active", i === suggestIndex);
    if (i === suggestIndex) item.scrollIntoView({ block: "nearest" });
  });
}

function drawGraph() {
  if (!selectedEnemy) return;

  const mode = document.getElementById("mode").value;
  const key = normalize(selectedEnemy);

  const counts = {};
  graphStageMap = {};
  let total = 0;
  let maxStage = 0;

  stagesData.forEach(ch => {
    const ok =
      mode === "ALL" ||
      (mode === "N" && ch.chapterId.startsWith("N") && !ch.chapterId.startsWith("NA") && !ch.chapterId.startsWith("ND")) ||
      (mode === "NA" && ch.chapterId.startsWith("NA")) ||
      (mode === "ND" && ch.chapterId.startsWith("ND"));

    if (!ok) return;

    ch.stages.forEach((st, i) => {
      const pos = i + 1;
      if (pos > maxStage) maxStage = pos;

      if (st.enemies.some(e => normalize(e) === key)) {
        counts[pos] = (counts[pos] || 0) + 1;
        total++;

        if (!graphStageMap[pos]) graphStageMap[pos] = [];

        graphStageMap[pos].push({
          chapterName: ch.chapterName,
          chapterId: ch.chapterId,
          stageId: st.stageId,
          stageName: st.stageName,
          enemies: st.enemies
        });
      }
    });
  });

  let lastNonZero = 0;

for (let i = 1; i <= maxStage; i++) {
  if ((counts[i] || 0) > 0) lastNonZero = i;
}

const displayMax = Math.max(6, lastNonZero);

const labels = [];
const data = [];

for (let i = 1; i <= displayMax; i++) {
  labels.push(i);
  data.push(counts[i] || 0);
}

  document.getElementById("info").textContent =
    `${selectedEnemy} 出現数: ${total}`;

  document.getElementById("stageList").innerHTML = "";

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: labels.map(n => `${n}ステージ目`),
      datasets: [{ label: "回数", data }]
    },
    options: {
  scales: {
    y: {
      beginAtZero: true,
      ticks: {
        stepSize: 1,
        precision: 0,
        maxTicksLimit: 5
      },
      grid: {
        drawTicks: true
      }
    }
  },
  onClick: (event, elements) => {
    if (elements.length === 0) return;

    const index = elements[0].index;
    const pos = labels[index];

    showStageList(pos);
  }
}
  });
  document.getElementById("stageList").innerHTML = "";
document.getElementById("showStageEnemiesLabel").style.display = "none";
lastSelectedPos = null;
}

function showStageList(pos) {
  document.getElementById("showStageEnemiesLabel").style.display = "block";
  lastSelectedPos = pos;

  const area = document.getElementById("stageList");
  const stages = graphStageMap[pos] || [];

  if (stages.length === 0) {
    area.innerHTML = `<h3>${pos}ステージ目の一覧</h3><p>該当なし</p>`;
    return;
  }

  const enemyName = selectedEnemy;
  const fileName = enemyName
    .replace(/\r?\n/g, "")
    .trim()
    .replace(/[：:]/g, " ")
    .replace(/[ 　]+/g, "");

  const imgPath = "image/" + encodeURIComponent(fileName) + ".png";
  const showEnemies = document.getElementById("showStageEnemies").checked;

  area.innerHTML = `
    <h3>${pos}ステージ目の一覧</h3>

    <div style="margin-bottom:10px;">
      <img src="${imgPath}" style="width:40px;" onerror="this.src='image/noimage.png'">
      ${enemyName}
    </div>

    <ul style="${showEnemies ? 'padding-left:0;' : ''}">
      ${stages.map(st => `
        <li style="
          margin-bottom:10px;
          ${showEnemies ? 'border:1px solid #ccc; border-radius:8px; padding:8px; list-style:none;' : ''}
        ">
          <div>
            ${st.chapterId}-${st.stageId}
            ${st.chapterName} - ${st.stageName}
          </div>

          ${showEnemies ? `
            <div style="margin-top:6px;">
              ${st.enemies
                .filter(e => e !== "カンバン娘")
                .map(enemy => `

  function getFirstNum(first) {
  const match = first.match(/([A-Z]+)(\d+)-(\d+)/);

  if (!match) return 999999;

  const prefix = match[1];
  const chap = parseInt(match[2]);
  const stage = parseInt(match[3]);

  const base =
    prefix === "N"  ? 0 :
    prefix === "NA" ? 100000 :
    prefix === "ND" ? 200000 :
    prefix === "E"  ? 300000 : 400000;

  return base + chap * 100 + stage;
}

function getEnemyTypesCached(enemyName) {
  const key = normalize(enemyName);

  if (enemyTypeCache[key]) {
    return enemyTypeCache[key];
  }

  const found = Object.values(enemiesData).find(enemy =>
    normalize(enemy.name) === key
  );

  if (!found || !found.type) {
    enemyTypeCache[key] = [];
    return [];
  }

  enemyTypeCache[key] = String(found.type)
    .split(",")
    .map(s => s.trim())
    .filter(Boolean);

  return enemyTypeCache[key];
}

      }

      if (ignoreCastle) {
        judgeEnemies = judgeEnemies.filter(e => !getEnemyTypesCached(e).includes("城"));
      }

      if (judgeEnemies.length === 0) return;

      const ok =
      selectedSameAttr === "ALL"
    ? judgeEnemies.every(enemyName => {
        const types = getEnemyTypesCached(enemyName);

        return judgeEnemies.every(otherEnemy => {
          const otherTypes = getEnemyTypesCached(otherEnemy);

          return types.some(t => otherTypes.includes(t));
        });
      })
    : judgeEnemies.every(enemyName => {
        const types = getEnemyTypesCached(enemyName);
        return types.includes(selectedSameAttr);
      });

      if (ok) {
        results.push({
          chapterId: ch.chapterId,
          stageId: st.stageId,
          chapterName: ch.chapterName,
          stageName: st.stageName,
          enemies: st.enemies
        });
      }

info.textContent = `${attrLabel}：${results.length}件`;

  "悪魔": "image_type/悪魔.png",
  "古代種": "image_type/古代種.png",
  "無属性": "image_type/無属性.png",
  "超生命体": "image_type/超生命体.png",
  "超獣": "image_type/超獣.png",
  "超賢者": "image_type/超賢者.png"
};

let stageAttrDesc = false;

function getStageAttrs(enemies, showKanban) {
  const set = new Set();

  enemies.forEach(enemyName => {
    if (!showKanban && normalize(enemyName) === normalize("カンバン娘")) return;

    getEnemyTypesCached(enemyName).forEach(t => {
      if (stageAttrOrder.includes(t)) set.add(t);
    });
  });

  return stageAttrOrder.filter(a => set.has(a));
}

function renderStageAttrIcons(attrs) {
  return attrs.map(attr => {
    if (stageAttrImageMap[attr]) {
      return `<img src="${stageAttrImageMap[attr]}" title="${attr}" style="width:24px;margin-right:4px;vertical-align:middle;">`;
    }

    if (attr === "城") {
      return `<span style="display:inline-block; min-width:24px; text-align:center; margin-right:4px; vertical-align:middle;">城</span>`;
    }

    return `<span>${attr}</span>`;
  }).join("");
}

function getStageAttrRows() {
  const mode = document.getElementById("stageAttrMode").value;
  const showKanban = document.getElementById("stageAttrShowKanban").checked;
  const rows = [];

  stagesData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    ch.stages.forEach((st, i) => {
      const stageId = st.stageId ?? i;
      const attrs = getStageAttrs(st.enemies, showKanban);

      rows.push({
        chapterId: ch.chapterId,
        chapterName: ch.chapterName,
        stageId,
        stageName: st.stageName,
        enemies: st.enemies,
        attrs,
        attrCount: attrs.length,
        attrKey: attrs.join("|"),
        stageOrder: getFirstNum(`${ch.chapterId}-${stageId}`)
      });
    });
  });

  return rows;
}

function drawStageAttrList() {
  const viewType = document.getElementById("stageAttrViewType").value;
  const sortKey = document.getElementById("stageAttrSortKey").value;
  const countFilter = document.getElementById("stageAttrCountFilter").value;
  const area = document.getElementById("stageAttrArea");

  area.innerHTML = "";

  let rows = getStageAttrRows();

  const maxCount = Math.max(0, ...rows.map(r => r.attrCount));
  const countSelect = document.getElementById("stageAttrCountFilter");
  const current = countSelect.value;

  countSelect.innerHTML = `<option value="ALL">属性数 全表示</option>`;
  for (let i = 1; i <= maxCount; i++) {
    countSelect.innerHTML += `<option value="${i}">${i}属性のみ</option>`;
  }
  countSelect.value = [...countSelect.options].some(o => o.value === current) ? current : "ALL";

  document.getElementById("stageAttrCountFilter").style.display =
    viewType === "group" ? "" : "none";

  document.getElementById("stageAttrEnemyToggleWrap").style.display =
    viewType === "group" ? "" : "none";

  document.getElementById("stageAttrSortKey").style.display =
    viewType === "list" ? "" : "none";

  document.getElementById("stageAttrOrderBtn").style.display =
    viewType === "list" ? "" : "none";

  if (countSelect.value !== "ALL") {
    rows = rows.filter(r => r.attrCount === Number(countSelect.value));
  }

  document.getElementById("stageAttrInfo").textContent = `${rows.length}ステージ`;

  if (viewType === "list") {
    drawStageAttrTable(rows, sortKey);
  } else {
    drawStageAttrGroup(rows);
  }
}

function drawStageAttrTable(rows, sortKey) {
  const area = document.getElementById("stageAttrArea");

  rows.sort((a, b) => {
    let result = sortKey === "attrCount"
      ? a.attrCount - b.attrCount || a.stageOrder - b.stageOrder
      : a.stageOrder - b.stageOrder;

    return stageAttrDesc ? -result : result;
  });

  const table = document.createElement("table");
  table.className = "detailTable";

  table.innerHTML = `
    <thead>
      <tr>
        <th>章名</th>
        <th>ステージ名</th>
        <th>属性数</th>
        <th>属性一覧</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;

  const tbody = table.querySelector("tbody");

  rows.forEach(row => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="chapterCell">${row.chapterName}</td>
      <td class="stageCell">${row.stageName}</td>
      <td class="numCell">${row.attrCount}</td>
      <td>${renderStageAttrIcons(row.attrs)}</td>
    `;
    tbody.appendChild(tr);
  });

  area.appendChild(table);
  mergeStageAttrChapterCells(tbody);
}

function mergeStageAttrChapterCells(tbody) {
  let prev = null;
  let start = null;
  let count = 0;

  const trs = tbody.querySelectorAll("tr");

  trs.forEach((tr, i) => {
    const cell = tr.children[0];
    const chapter = cell.textContent;

    if (chapter === prev) {
      count++;
      cell.remove();
    } else {
      if (start !== null && count > 1) {
        trs[start].children[0].rowSpan = count;
      }
      prev = chapter;
      start = i;
      count = 1;
    }

    if (i === trs.length - 1 && count > 1) {
      trs[start].children[0].rowSpan = count;
    }
  });
}

function drawStageAttrGroup(rows) {
  const showEnemies =
    document.getElementById("stageAttrShowEnemies").checked;
  
  const area = document.getElementById("stageAttrArea");
  const byCount = {};

  rows.forEach(row => {
    if (!byCount[row.attrCount]) byCount[row.attrCount] = {};
    if (!byCount[row.attrCount][row.attrKey]) byCount[row.attrCount][row.attrKey] = [];
    byCount[row.attrCount][row.attrKey].push(row);
  });

  Object.keys(byCount).map(Number).sort((a, b) => a - b).forEach(count => {
    const total = Object.values(byCount[count]).reduce((sum, list) => sum + list.length, 0);

    area.innerHTML += `<h3>${count}属性</h3><div style="font-weight:bold;">全${total}ステージ</div>`;

    Object.entries(byCount[count])
      .sort((a, b) => compareStageAttrKey(a[0], b[0]))
      .forEach(([key, stages]) => {
        stages.sort((a, b) => a.stageOrder - b.stageOrder);

        const attrs = key ? key.split("|") : [];

        const box = document.createElement("div");
box.className = "sameBox";

box.innerHTML = `
  <div style="font-weight:bold;">
    ${renderStageAttrIcons(attrs)}
  </div>

  <div style="margin-top:6px;font-weight:bold;">
    ${stages.length}ステージ
  </div>

  <ul>
    ${stages.map(st => `
      <li style="margin-bottom:8px;">
        <div>
          ${st.chapterId}-${st.stageId}
          ${st.chapterName}-${st.stageName}
        </div>

        ${showEnemies ? `
  <div class="stageEnemyIcons" style="margin-top:4px;">
    ${st.enemies
      .filter(enemy =>
        document.getElementById("stageAttrShowKanban").checked ||
        normalize(enemy) !== normalize("カンバン娘")
      )
      .slice(0, 12).map(enemy => `
        <img
          src="${getEnemyImagePath(enemy)}"
          title="${enemy}"
          loading="lazy"
          decoding="async"
          style="width:28px;margin-right:2px;"
          onerror="this.src='image/noimage.png'"
        >
      `).join("")}
  </div>
` : ""}
      </li>
    `).join("")}
  </ul>
`;
        area.appendChild(box);
      });
  });
}

  function toggleStageEnemies(btn) {
  const area = btn.nextElementSibling;

  if (area.style.display === "none") {
    area.style.display = "";

    if (!area.dataset.loaded) {
      const enemies = JSON.parse(decodeURIComponent(area.dataset.enemies));

      area.innerHTML = enemies.map(enemy => `
        <img
          src="${getEnemyImagePath(enemy)}"
          title="${enemy}"
          loading="lazy"
          decoding="async"
          style="width:28px;margin-right:2px;"
          onerror="this.src='image/noimage.png'"
        >
      `).join("");
      area.dataset.loaded = "1";
    }

    btn.textContent = "構成非表示";
  } else {
    area.style.display = "none";
    btn.textContent = "構成表示";
  }
}

function compareStageAttrKey(a, b) {
  const aa = a.split("|");
  const bb = b.split("|");

  for (let i = 0; i < Math.max(aa.length, bb.length); i++) {
    const ai = stageAttrOrder.indexOf(aa[i]);
    const bi = stageAttrOrder.indexOf(bb[i]);

    if (ai !== bi) return ai - bi;
  }

  return 0;
}

function toggleStageAttrOrder() {
  stageAttrDesc = !stageAttrDesc;

  document.getElementById("stageAttrOrderBtn").textContent =
    stageAttrDesc ? "降順" : "昇順";

  drawStageAttrList();
}

  // 章別統率力
  function drawEnergyTotal() {
  const mode = document.getElementById("energyMode").value;
  const tbody = document.getElementById("energyTotalBody");

  tbody.innerHTML = "";

  let allEnergy = 0;
  let allStages = 0;

  stageDetailsData.forEach(ch => {
    if (!isTargetChapter(ch, mode)) return;

    let totalEnergy = 0;
    let stageCount = 0;

    ch.stages.forEach(st => {
      totalEnergy += Number(st.energy) || 0;
      stageCount++;
    });

    allEnergy += totalEnergy;
    allStages += stageCount;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="stageCell">${ch.chapterName}</td>
      <td class="numCell">${stageCount}</td>
      <td class="numCell">${totalEnergy.toLocaleString()}</td>
    `;
    tbody.appendChild(tr);
  });

  const tr = document.createElement("tr");
  tr.style.fontWeight = "bold";
  tr.innerHTML = `
    <td class="stageCell">合計</td>
    <td class="numCell">${allStages}</td>
    <td class="numCell">${allEnergy.toLocaleString()}</td>
  `;
  tbody.appendChild(tr);
}
  
init();
</script>
